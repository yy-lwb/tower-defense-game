<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>保卫西瓜 - 塔防游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            display: flex;
            gap: 0;
            max-width: 100vw;
            max-height: 100vh;
            max-height: 100dvh;
        }
        canvas {
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(255,200,100,0.3);
            display: block;
            touch-action: none;
        }
        #sidebar {
            width: 220px;
            background: rgba(20,20,40,0.95);
            border-radius: 0 12px 12px 0;
            padding: 15px 12px;
            color: #fff;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 2px solid rgba(255,200,100,0.2);
            border-left: none;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .panel-title {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
            padding-bottom: 8px;
            border-bottom: 2px solid rgba(255,215,0,0.3);
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            padding: 4px 0;
        }
        .info-label { color: #aaa; }
        .info-value { color: #ffd700; font-weight: bold; }
        .tower-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.05);
            touch-action: manipulation;
        }
        .tower-btn:hover { border-color: #ffd700; background: rgba(255,215,0,0.1); }
        .tower-btn.selected { border-color: #ffd700; background: rgba(255,215,0,0.2); box-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .tower-btn.disabled { opacity: 0.4; cursor: not-allowed; }
        .tower-icon {
            width: 36px; height: 36px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .tower-info { flex: 1; }
        .tower-name { font-size: 13px; font-weight: bold; color: #fff; }
        .tower-cost { font-size: 11px; color: #ffd700; }
        .tower-desc { font-size: 10px; color: #888; margin-top: 2px; }
        .btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .btn-start {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #333;
        }
        .btn-start:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(255,215,0,0.5); }
        .btn-upgrade {
            background: linear-gradient(135deg, #00c853, #00e676);
            color: #fff;
            font-size: 12px;
            padding: 8px;
        }
        .btn-sell {
            background: linear-gradient(135deg, #ff5252, #ff1744);
            color: #fff;
            font-size: 12px;
            padding: 8px;
        }
        #startScreen, #gameOverScreen, #winScreen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            z-index: 10;
        }
        #startScreen h1, #winScreen h1 {
            font-size: 48px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            margin-bottom: 10px;
        }
        #gameOverScreen h1 {
            font-size: 48px;
            color: #ff5252;
            text-shadow: 0 0 20px rgba(255,82,82,0.5);
            margin-bottom: 10px;
        }
        .subtitle {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .level-select {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .level-btn {
            width: 60px; height: 60px;
            border: 3px solid rgba(255,215,0,0.4);
            border-radius: 10px;
            background: rgba(255,215,0,0.1);
            color: #ffd700;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .level-btn:hover { border-color: #ffd700; background: rgba(255,215,0,0.3); transform: scale(1.1); }
        .level-btn.locked { opacity: 0.3; cursor: not-allowed; }
        .hidden { display: none !important; }
        .speed-btn {
            font-size: 11px;
            padding: 5px 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            touch-action: manipulation;
        }
        .speed-btn:hover { background: rgba(255,215,0,0.2); border-color: #ffd700; }
        #towerDetail {
            padding: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 2px 0;
        }
        .detail-label { color: #aaa; }
        .detail-value { color: #fff; }

        /* ===== 移动端适配 ===== */
        @media (max-width: 1024px) {
            body {
                align-items: flex-start;
                justify-content: flex-start;
            }
            #gameContainer {
                flex-direction: column;
                width: 100vw;
                height: 100vh;
                height: 100dvh;
            }
            canvas {
                border-radius: 0;
                flex-shrink: 0;
            }
            #sidebar {
                width: 100%;
                border-radius: 0;
                border-left: 2px solid rgba(255,200,100,0.2);
                border-top: none;
                flex-direction: column;
                padding: 8px 10px;
                gap: 6px;
                max-height: 45vh;
                overflow-y: auto;
            }
            .panel-title { font-size: 13px; padding-bottom: 4px; }
            .info-row { font-size: 12px; padding: 2px 0; }
            #towerShop {
                display: flex;
                gap: 6px;
                overflow-x: auto;
                padding-bottom: 4px;
                -webkit-overflow-scrolling: touch;
            }
            #towerShop::-webkit-scrollbar { display: none; }
            .tower-btn {
                flex-direction: column;
                min-width: 80px;
                gap: 4px;
                padding: 6px;
                flex-shrink: 0;
            }
            .tower-icon { width: 30px; height: 30px; font-size: 16px; }
            .tower-desc { display: none; }
            .tower-name { font-size: 11px; }
            .tower-cost { font-size: 10px; }
            #towerDetail .panel-title { font-size: 11px; }
            .detail-row { font-size: 11px; }
            .btn { padding: 8px; font-size: 13px; }
            .btn-upgrade, .btn-sell { padding: 6px; font-size: 11px; }
            .speed-btn { padding: 6px 12px; font-size: 12px; }

            #startScreen, #gameOverScreen, #winScreen {
                width: 100%;
                height: 100%;
                border-radius: 0;
                padding: 20px;
            }
            #startScreen h1, #winScreen h1 {
                font-size: 32px;
            }
            #gameOverScreen h1 {
                font-size: 32px;
            }
            .subtitle { font-size: 14px; margin-bottom: 20px; }
            .level-btn {
                width: 50px; height: 50px;
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .info-row { font-size: 11px; }
            .tower-btn { min-width: 70px; padding: 5px; }
            .tower-icon { width: 26px; height: 26px; font-size: 14px; }
            .tower-name { font-size: 10px; }
            #startScreen h1, #winScreen h1 { font-size: 26px; }
            #gameOverScreen h1 { font-size: 26px; }
            .level-btn { width: 44px; height: 44px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <!-- 开始界面 -->
        <div id="startScreen">
            <h1>🍉 保卫西瓜</h1>
            <p class="subtitle">选择关卡开始游戏</p>
            <div class="level-select" id="levelSelect"></div>
            <div style="margin-top:12px;">
                <button class="btn" style="background:linear-gradient(135deg,#7c4dff,#e040fb);color:#fff;font-size:13px;" onclick="openNest()">🥚 怪物窝</button>
            </div>
            <p style="color:#666;font-size:12px;margin-top:10px;">🏆 获得金萝卜+清除障碍物可解锁隐藏关卡</p>
        </div>

        <!-- 游戏结束界面 -->
        <div id="gameOverScreen" class="hidden">
            <h1>💀 游戏结束</h1>
            <p class="subtitle">西瓜被怪物吃掉了...</p>
            <p style="color:#ffd700;font-size:18px;margin-bottom:20px;" id="overScore"></p>
            <button class="btn btn-start" onclick="showStart()">重新开始</button>
        </div>

        <!-- 胜利界面 -->
        <div id="winScreen" class="hidden">
            <h1>🎉 关卡通过！</h1>
            <p class="subtitle">西瓜安全了！</p>
            <div id="winRating" style="margin-bottom:10px;"></div>
            <p style="color:#ffd700;font-size:18px;margin-bottom:10px;" id="winScore"></p>
            <div id="winRewards" style="margin-bottom:15px;"></div>
            <div style="display:flex;gap:12px;">
                <button class="btn btn-start" onclick="nextLevel()">下一关</button>
                <button class="btn" style="background:rgba(255,255,255,0.1);color:#fff;" onclick="showStart()">返回</button>
            </div>
        </div>

        <!-- 怪物窝界面 -->
        <div id="monsterNest" class="hidden">
            <h1 style="font-size:36px;">🥚 怪物窝</h1>
            <p class="subtitle">孵化并喂养你的怪物</p>
            <div id="nestContent" style="width:90%;max-width:400px;max-height:60vh;overflow-y:auto;"></div>
            <button class="btn btn-start" style="margin-top:15px;" onclick="closeNest()">返回</button>
        </div>

        <!-- 侧边栏 -->
        <div id="sidebar">
            <div class="panel-title">🍉 保卫西瓜</div>
            <div style="text-align:center;padding:4px 0;">
                <span style="color:#ff9800;font-size:13px;font-weight:bold;" id="levelInfoDisplay">第1关 · 绿野仙踪</span>
                <div id="ratingDisplay" style="margin-top:2px;"></div>
            </div>
            <div>
                <div class="info-row">
                    <span class="info-label">💰 金币</span>
                    <span class="info-value" id="goldDisplay">200</span>
                </div>
                <div class="info-row">
                    <span class="info-label">❤️ 生命</span>
                    <span class="info-value" id="livesDisplay">20</span>
                </div>
                <div class="info-row">
                    <span class="info-label">🌊 波次</span>
                    <span class="info-value" id="waveDisplay">0/0</span>
                </div>
                <div class="info-row">
                    <span class="info-label">⭐ 得分</span>
                    <span class="info-value" id="scoreDisplay">0</span>
                </div>
                <div class="info-row">
                    <span class="info-label">🥚 怪物蛋</span>
                    <span class="info-value" id="eggDisplay">0</span>
                </div>
                <div class="info-row" id="obstacleRow" style="display:none;">
                    <span class="info-label">🧱 障碍物</span>
                    <span class="info-value" id="obstacleDisplay">0/0</span>
                </div>
            </div>
            <div class="panel-title" style="font-size:13px;margin-top:5px;">🔨 炮塔商店</div>
            <div id="towerShop"></div>
            <div id="towerDetail" class="hidden">
                <div class="panel-title" style="font-size:12px;">📊 炮塔信息</div>
                <div class="detail-row"><span class="detail-label">名称</span><span class="detail-value" id="detailName">-</span></div>
                <div class="detail-row"><span class="detail-label">等级</span><span class="detail-value" id="detailLevel">-</span></div>
                <div class="detail-row"><span class="detail-label">伤害</span><span class="detail-value" id="detailDmg">-</span></div>
                <div class="detail-row"><span class="detail-label">攻速</span><span class="detail-value" id="detailSpeed">-</span></div>
                <div class="detail-row"><span class="detail-label">范围</span><span class="detail-value" id="detailRange">-</span></div>
                <div style="display:flex;gap:6px;margin-top:8px;">
                    <button class="btn btn-upgrade" style="flex:1;" onclick="upgradeTower()">⬆ 升级</button>
                    <button class="btn btn-sell" style="flex:1;" onclick="sellTower()">💰 出售</button>
                </div>
            </div>
            <div style="display:flex;gap:6px;margin-top:auto;">
                <button class="btn btn-start" style="flex:1;" id="startWaveBtn" onclick="startWave()">▶ 开始</button>
                <button class="speed-btn" onclick="togglePause()" id="pauseBtn">⏸ 暂停</button>
                <button class="speed-btn" onclick="toggleSpeed()" id="speedBtn">1x</button>
            </div>
        </div>
    </div>

    <script>
    // ============ 画布自适应缩放 ============
    function resizeCanvas() {
        let isMobile = window.innerWidth <= 1024;
        let container = document.getElementById('gameContainer');

        if (isMobile) {
            // 移动端：画布宽度撑满屏幕，高度按比例
            let sidebar = document.getElementById('sidebar');
            let sidebarH = sidebar ? sidebar.offsetHeight : 250;
            let availW = window.innerWidth;
            let availH = window.innerHeight - sidebarH;
            let scale = Math.min(availW / 800, availH / 600);
            let w = Math.floor(800 * scale);
            let h = Math.floor(600 * scale);
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            canvas.style.margin = '0 auto';
        } else {
            // PC端：正常显示
            canvas.style.width = '800px';
            canvas.style.height = '600px';
        }
    }
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));

    // 阻止移动端默认手势（缩放、滚动等）
    document.addEventListener('touchmove', function(e) {
        if (e.target === canvas || e.target.closest('#gameContainer')) {
            e.preventDefault();
        }
    }, { passive: false });

    const TILE = 40;

        },

        }

    // ============ 怪物定义 ============

        {

            path: [[-1,1],[4,1],[4,14],[9,14],[9,1],[14,1],[14,14],[17,14],[17,7],[18,7]],

    // 从 localStorage 加载持久数据
    function loadSaveData() {
        try {

            if (data) {
                game.unlockedLevels = data.unlockedLevels || 1;
                game.eggs = data.eggs || [];

                game.levelStars = data.levelStars || {};
                game.hiddenUnlocked = data.hiddenUnlocked || {};

    // ============ 工具函数 ============
    function dist(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); }

    function lerp(a, b, t) { return a + (b - a) * t; }

    function generatePathPixels(path) {
        let pixels = [];
        for (let i = 0; i < path.length - 1; i++) {
            let [x1, y1] = path[i];
            let [x2, y2] = path[i + 1];
            let sx = x1 * TILE + TILE / 2;
            let sy = y1 * TILE + TILE / 2;
            let ex = x2 * TILE + TILE / 2;
            let ey = y2 * TILE + TILE / 2;
            let d = dist(sx, sy, ex, ey);
            let steps = Math.ceil(d / 4);
            for (let j = 0; j <= steps; j++) {
                pixels.push({ x: lerp(sx, ex, j / steps), y: lerp(sy, ey, j / steps) });
            }
        }
        return pixels;
    }

    function generatePathGrid(path) {
        let set = new Set();
        for (let i = 0; i < path.length - 1; i++) {
            let [x1, y1] = path[i];
            let [x2, y2] = path[i + 1];
            let sx = Math.max(0, Math.min(x1, x2));
            let sy = Math.max(0, Math.min(y1, y2));
            let ex = Math.max(x1, x2);
            let ey = Math.max(y1, y2);
            for (let x = sx; x <= Math.min(ex, COLS - 1); x++) {
                for (let y = sy; y <= Math.min(ey, ROWS - 1); y++) {
                    set.add(`${x},${y}`);
                }
            }
        }
        return set;
    }

    // ============ 关卡初始化 ============
    function initLevel(levelIdx) {
        let level = LEVELS[levelIdx];
        game.currentLevel = levelIdx;
        game.gold = level.startGold;
        game.lives = 20;
        game.score = 0;
        game.currentWave = 0;
        game.waveActive = false;
        game.towers = [];
        game.monsters = [];
        game.bullets = [];
        game.effects = [];
        game.particles = [];
        game.floatingTexts = [];
        game.selectedTower = null;
        game.selectedType = null;
        game.carrotHp = 20;
        game.maxCarrotHp = 20;
        game.paused = false;
        game.speed = 1;
        game.damageTaken = 0;
        game.levelStartTime = Date.now();
        game.towerTypesUsed = {};
        game.secretPortalActive = false;
        document.getElementById('pauseBtn').textContent = '⏸ 暂停';

        // 初始化障碍物
        game.obstacles = [];
        game.totalObstacles = 0;
        game.clearedObstacles = 0;
        if (level.obstacles) {
            level.obstacles.forEach(ob => {
                game.obstacles.push({
                    x: ob.x, y: ob.y,
                    type: ob.type,
                    hp: OBSTACLE_TYPES[ob.type].hp,
                    maxHp: OBSTACLE_TYPES[ob.type].hp
                });
            });
            game.totalObstacles = level.obstacles.length;
        }

        game.pathPixels = generatePathPixels(level.path);
        game.pathGrid = generatePathGrid(level.path);
        game.grid = [];
        for (let x = 0; x < COLS; x++) {
            game.grid[x] = [];
            for (let y = 0; y < ROWS; y++) {
                if (game.pathGrid.has(`${x},${y}`)) {
                    game.grid[x][y] = 1;
                } else if (game.obstacles.some(ob => ob.x === x && ob.y === y)) {
                    game.grid[x][y] = 3; // obstacle
                } else {
                    game.grid[x][y] = 0;
                }
            }
        }

        let lastP = level.path[level.path.length - 1];
        game.carrotPos = { x: lastP[0] * TILE + TILE / 2, y: lastP[1] * TILE + TILE / 2 };
        game.running = true;

        updateUI();
        renderTowerShop();
        document.getElementById('speedBtn').textContent = '1x';
        document.getElementById('levelInfoDisplay').textContent = `第${levelIdx + 1}关 · ${level.name}`;
        if (game.totalObstacles > 0) {
            document.getElementById('obstacleRow').style.display = 'flex';
        } else {
            document.getElementById('obstacleRow').style.display = 'none';
        }
        // 显示已有评价
        let stars = game.levelStars[levelIdx];
        document.getElementById('ratingDisplay').innerHTML = stars ?
            `${stars.goldenCarrot ? '🏆' : '⭐'} ${stars.stars}星${stars.goldenCarrot ? ' · 金西瓜' : ''}${stars.obstaclesCleared ? ' · 道具全清' : ''}` : '';

        // 检查隐藏任务提示
        if (level.hiddenTask) {
            document.getElementById('ratingDisplay').innerHTML += `<br><span style="font-size:10px;color:#aaa;">🎯 ${level.hiddenTask.desc}</span>`;
        }
        if (level.secretTrigger) {
            document.getElementById('ratingDisplay').innerHTML += `<br><span style="font-size:10px;color:#aaa;">🔑 ${level.secretTrigger.desc}</span>`;
        }
    }

    // ============ UI 渲染 ============
    function updateUI() {
        document.getElementById('goldDisplay').textContent = game.gold;
        document.getElementById('livesDisplay').textContent = game.lives;
        document.getElementById('scoreDisplay').textContent = game.score;
        document.getElementById('eggDisplay').textContent = game.eggs.length;

        document.getElementById('waveDisplay').textContent = `${game.currentWave}/${level.waves.length}`;
        document.getElementById('startWaveBtn').textContent = game.waveActive ? '🌊 进行中' : '▶ 开始';

        if (game.totalObstacles > 0) {

        }

        // Update tower button states
        document.querySelectorAll('.tower-btn').forEach(btn => {
            let type = btn.dataset.type;
            let cost = TOWER_TYPES[type].cost;
            if (game.gold < cost) btn.classList.add('disabled');
            else btn.classList.remove('disabled');
        });

        // Tower detail
        if (game.selectedTower) {
            document.getElementById('towerDetail').classList.remove('hidden');
            let t = game.selectedTower;
            let lv = t.level;
            document.getElementById('detailName').textContent = TOWER_TYPES[t.type].name;
            document.getElementById('detailLevel').textContent = `Lv.${lv + 1}`;
            document.getElementById('detailDmg').textContent = TOWER_TYPES[t.type].levels[lv].damage;
            document.getElementById('detailSpeed').textContent = (TOWER_TYPES[t.type].levels[lv].fireRate / 1000).toFixed(1) + 's';
            document.getElementById('detailRange').textContent = TOWER_TYPES[t.type].levels[lv].range;
        } else {
            document.getElementById('towerDetail').classList.add('hidden');
        }

    function renderTowerShop() {
        let html = '';
        for (let [key, t] of Object.entries(TOWER_TYPES)) {
            html += `<div class="tower-btn" data-type="${key}" onclick="selectTowerType('${key}')">
                <div class="tower-icon" style="background:${t.color}30;border:2px solid ${t.color}">${t.icon}</div>
                <div class="tower-info">
                    <div class="tower-name">${t.name}</div>
                    <div class="tower-cost">💰 ${t.cost}</div>
                    <div class="tower-desc">${t.desc}</div>
                </div>
            </div>`;
        }
        document.getElementById('towerShop').innerHTML = html;
    }

    function renderLevelSelect() {
        let html = '';
        for (let i = 0; i < LEVELS.length; i++) {
            let level = LEVELS[i];
            let locked = false;
            if (level.hidden) {
                // 隐藏关卡 - 检查是否已解锁
                if (game.hiddenUnlocked[i]) {
                    locked = false;
                } else {
                    locked = true;
                }
            } else {
                locked = i >= game.unlockedLevels;
            }
            let stars = game.levelStars[i];
            let starStr = stars ? (stars.goldenCarrot ? '🏆' : '⭐') + stars.stars : (locked ? '🔒' : '');
            let bgStyle = level.hidden && !locked ? '' :
                (stars && stars.goldenCarrot ? 'border-color:#ffd700;background:rgba(255,215,0,0.2);' : '');
            html += `<div class="level-btn ${locked ? 'locked' : ''}" style="${bgStyle}" onclick="${locked ? '' : 'startLevel(' + i + ')'}">
                ${level.hidden && !locked ? '🔒' : (i + 1)}<br><span style="font-size:10px;">${starStr}</span>
            </div>`;
        }
        document.getElementById('levelSelect').innerHTML = html;
    }

    // ============ 游戏操作 ============
    function showStart() {
        document.getElementById('startScreen').classList.remove('hidden');
        document.getElementById('gameOverScreen').classList.add('hidden');
        document.getElementById('winScreen').classList.add('hidden');
        game.running = false;
        renderLevelSelect();
    }

    function startLevel(idx) {
        document.getElementById('startScreen').classList.add('hidden');
        initLevel(idx);
    }

    function nextLevel() {
        document.getElementById('winScreen').classList.add('hidden');
        if (game.currentLevel + 1 < LEVELS.length) {
            initLevel(game.currentLevel + 1);
        } else {
            showStart();
        }
    }

    function selectTowerType(type) {
        if (game.gold < TOWER_TYPES[type].cost) return;
        game.selectedType = game.selectedType === type ? null : type;
        game.selectedTower = null;
        document.querySelectorAll('.tower-btn').forEach(btn => {
            btn.classList.toggle('selected', btn.dataset.type === game.selectedType);
        });
        updateUI();
    }

    function placeTower(gx, gy) {
        if (game.grid[gx][gy] !== 0) return;
        if (!game.selectedType) return;
        let type = TOWER_TYPES[game.selectedType];
        if (game.gold < type.cost) return;

        game.gold -= type.cost;
        game.towers.push({
            type: game.selectedType,
            x: gx * TILE + TILE / 2,
            y: gy * TILE + TILE / 2,
            gx: gx, gy: gy,
            level: 0,
            lastFire: 0,
            angle: 0,
            totalCost: type.cost
        });
        game.grid[gx][gy] = 2; // tower
        game.towerTypesUsed[game.selectedType] = true;
        updateUI();
    }

    function upgradeTower() {
        if (!game.selectedTower) return;
        let t = game.selectedTower;
        let type = TOWER_TYPES[t.type];
        if (t.level >= type.levels.length - 1) return;
        let cost = type.levels[t.level + 1].upgradeCost;
        if (game.gold < cost) return;
        game.gold -= cost;
        t.level++;
        t.totalCost += cost;
        updateUI();
    }

    function sellTower() {
        if (!game.selectedTower) return;
        let t = game.selectedTower;
        let refund = Math.floor(t.totalCost * 0.6);
        game.gold += refund;
        game.grid[t.gx][t.gy] = 0;
        game.towers = game.towers.filter(tw => tw !== t);
        game.selectedTower = null;
        addFloatingText(`+${refund}💰`, t.x, t.y, '#ffd700');
        updateUI();
    }

    function startWave() {
        if (game.waveActive || game.paused) return;
        let level = LEVELS[game.currentLevel];
        if (game.currentWave >= level.waves.length) return;
        game.waveActive = true;
        spawnWave(game.currentWave);
        game.currentWave++;
        updateUI();
    }

    function togglePause() {
        if (!game.running) return;
        game.paused = !game.paused;
        document.getElementById('pauseBtn').textContent = game.paused ? '▶ 继续' : '⏸ 暂停';
        // 暂停时在画布上显示暂停文字
        if (game.paused) {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, 800, 600);
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 48px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⏸ 游戏暂停', 400, 280);
            ctx.font = '20px Microsoft YaHei';
            ctx.fillStyle = '#aaa';
            ctx.fillText('点击继续按钮恢复游戏', 400, 330);
        }
    }

    function toggleSpeed() {
        game.speed = game.speed === 1 ? 2 : game.speed === 2 ? 3 : 1;
        document.getElementById('speedBtn').textContent = game.speed + 'x';
    }

    // ============ 怪物生成 ============
    function spawnWave(waveIdx) {
        let level = LEVELS[game.currentLevel];
        let wave = level.waves[waveIdx];
        let delay = 0;
        wave.monsters.forEach(group => {
            for (let i = 0; i < group.count; i++) {
                setTimeout(() => {
                    if (!game.running) return;
                    spawnMonster(group.type);
                }, delay);
                delay += group.interval;
            }
        });
    }

    function spawnMonster(type) {
        let mt = MONSTER_TYPES[type];
        let level = LEVELS[game.currentLevel];
        game.monsters.push({
            type: type,
            x: level.path[0][0] * TILE + TILE / 2,
            y: level.path[0][1] * TILE + TILE / 2,
            hp: mt.hp, maxHp: mt.hp,
            speed: mt.speed,
            pathIndex: 0,
            pathProgress: 0,
            reward: mt.reward,
            color: mt.color,
            size: mt.size,
            slow: 0, slowTimer: 0,
            alive: true
        });
    }

    // ============ 子弹 ============
    function fireBullet(tower, target) {
        let type = TOWER_TYPES[tower.type];
        let lv = type.levels[tower.level];
        game.bullets.push({
            x: tower.x, y: tower.y,
            target: target,
            damage: lv.damage,
            speed: type.bulletSpeed,
            color: type.bulletColor,
            splash: lv.splash || 0,
            slow: lv.slow || 0,
            type: tower.type
        });
    }

    // ============ 特效 ============
    function addEffect(x, y, radius, color) {
        game.effects.push({ x, y, radius, maxRadius: radius, color, life: 1 });
    }

    function addFloatingText(text, x, y, color) {
        game.floatingTexts.push({ text, x, y, color, life: 1, vy: -2 });
    }

    function addParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
            let angle = Math.random() * Math.PI * 2;
            let speed = 1 + Math.random() * 3;
            game.particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 0.5 + Math.random() * 0.5,
                color, size: 2 + Math.random() * 3
            });
        }
    }

    // ============ 游戏更新 ============
    function update() {
        if (!game.running || game.paused) return;

        game.carrotAnim += 0.03;

        // Update monsters
        for (let m of game.monsters) {
            if (!m.alive) continue;

            // Slow effect
            if (m.slowTimer > 0) {
                m.slowTimer -= 16;
                if (m.slowTimer <= 0) m.slow = 0;
            }

            let speedMult = 1 - m.slow;
            let moveSpeed = m.speed * speedMult * game.speed;

            // Move along path
            let level = LEVELS[game.currentLevel];
            if (m.pathIndex < level.path.length - 1) {
                let [x1, y1] = level.path[m.pathIndex];
                let [x2, y2] = level.path[m.pathIndex + 1];
                let sx = x1 * TILE + TILE / 2;
                let sy = y1 * TILE + TILE / 2;
                let ex = x2 * TILE + TILE / 2;
                let ey = y2 * TILE + TILE / 2;
                let d = dist(sx, sy, ex, ey);

                m.pathProgress += moveSpeed / d * TILE * 0.05;

                if (m.pathProgress >= 1) {
                    m.pathProgress = 0;
                    m.pathIndex++;
                    if (m.pathIndex >= level.path.length - 1) {
                        // Reached watermelon
                        m.alive = false;
                        game.eatingAnim = true;
                        game.eatingTimer = 50;
                        game.eatingMonster = { color: m.color, size: m.size };
                        game.lives--;
                        game.carrotHp--;
                        game.damageTaken++;  // 记录受伤次数
                        addParticles(game.carrotPos.x, game.carrotPos.y, '#ff5252', 8);
                        addFloatingText('-1 ❤️', game.carrotPos.x, game.carrotPos.y - 20, '#ff5252');
                        if (game.lives <= 0) {
                            gameOver();
                            return;
                        }
                    }
                } else {
                    m.x = lerp(sx, ex, m.pathProgress);
                    m.y = lerp(sy, ey, m.pathProgress);
                }
            }
        }

        // Tower firing
        let now = Date.now();
        for (let t of game.towers) {
            let type = TOWER_TYPES[t.type];
            let lv = type.levels[t.level];
            let target = null;
            let minDist = Infinity;

            for (let m of game.monsters) {
                if (!m.alive) continue;
                let d = dist(t.x, t.y, m.x, m.y);
                if (d <= lv.range && d < minDist) {
                    // Prefer monsters further along the path
                    if (!target || m.pathIndex > target.pathIndex || (m.pathIndex === target.pathIndex && m.pathProgress > target.pathProgress)) {
                        target = m;
                        minDist = d;
                    }
                }
            }

            if (target) {
                t.angle = Math.atan2(target.y - t.y, target.x - t.x);
                if (now - t.lastFire >= lv.fireRate / game.speed) {
                    t.lastFire = now;
                    fireBullet(t, target);
                }
            }
        }

        // Update bullets
        for (let b of game.bullets) {
            if (!b.target || !b.target.alive) {
                b.dead = true;
                continue;
            }
            let dx = b.target.x - b.x;
            let dy = b.target.y - b.y;
            let d = dist(b.x, b.y, b.target.x, b.target.y);
            if (d < b.speed * 2) {
                // Hit
                b.target.hp -= b.damage;
                b.dead = true;
                addParticles(b.x, b.y, b.color, 5);

                if (b.slow > 0 && b.target.alive) {
                    b.target.slow = b.slow;
                    b.target.slowTimer = 2000;
                }

                if (b.splash > 0) {
                    addEffect(b.x, b.y, b.splash, b.color);
                    for (let m of game.monsters) {
                        if (m === b.target || !m.alive) continue;
                        if (dist(b.x, b.y, m.x, m.y) < b.splash) {
                            m.hp -= b.damage * 0.5;
                            if (b.slow > 0) {
                                m.slow = b.slow;
                                m.slowTimer = 1500;
                            }
                        }
                    }
                }

                if (b.target.hp <= 0 && b.target.alive) {
                    b.target.alive = false;
                    game.gold += b.target.reward;
                    game.score += b.target.reward;
                    addFloatingText(`+${b.target.reward}💰`, b.target.x, b.target.y, '#ffd700');
                    addParticles(b.target.x, b.target.y, b.target.color, 10);
                }
            } else {
                b.x += (dx / d) * b.speed * game.speed * 2;
                b.y += (dy / d) * b.speed * game.speed * 2;
            }
        }

        // Update effects
        for (let e of game.effects) {
            e.life -= 0.05;
        }

        // Update particles
        for (let p of game.particles) {
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02;
            p.vx *= 0.96;
            p.vy *= 0.96;
        }

        // Update floating texts
        for (let ft of game.floatingTexts) {
            ft.y += ft.vy;
            ft.life -= 0.02;
        }

        // Cleanup
        game.monsters = game.monsters.filter(m => m.alive);
        game.bullets = game.bullets.filter(b => !b.dead);
        game.effects = game.effects.filter(e => e.life > 0);
        game.particles = game.particles.filter(p => p.life > 0);
        game.floatingTexts = game.floatingTexts.filter(ft => ft.life > 0);

        // Check wave complete
        if (game.waveActive && game.monsters.length === 0) {
            // Check if all monsters from wave have spawned
            let level = LEVELS[game.currentLevel];
            if (game.currentWave >= level.waves.length) {
                // All waves complete
                winGame();
                return;
            }
            game.waveActive = false;
        }

        updateUI();
    }

    function gameOver() {
        game.running = false;
        game.paused = false;
        document.getElementById('overScore').textContent = `得分：${game.score}`;
        document.getElementById('gameOverScreen').classList.remove('hidden');
    }

    function winGame() {
        game.running = false;
        game.paused = false;
        let level = LEVELS[game.currentLevel];

        // 评价计算
        let goldenCarrot = game.damageTaken === 0;
        let obstaclesCleared = game.totalObstacles > 0 && game.clearedObstacles >= game.totalObstacles;
        let stars = 1;
        if (game.damageTaken <= 3) stars = 2;
        if (goldenCarrot) stars = 3;

        // 检查隐藏任务
        let hiddenTaskDone = false;
        if (level.hiddenTask) {
            let ht = level.hiddenTask;
            if (ht.type === 'towerOnly' && Object.keys(game.towerTypesUsed).length === 1 && game.towerTypesUsed[ht.towerType]) hiddenTaskDone = true;
            if (ht.type === 'timeLimit' && (Date.now() - game.levelStartTime) / 1000 <= ht.seconds) hiddenTaskDone = true;
            if (ht.type === 'minTowers' && game.towers.length >= ht.minCount) hiddenTaskDone = true;
            if (ht.type === 'maxStars' && game.damageTaken === 0) hiddenTaskDone = true;
        }

        // 保存星级
        let prev = game.levelStars[game.currentLevel] || {};
        game.levelStars[game.currentLevel] = {
            stars: Math.max(stars, prev.stars || 0),
            goldenCarrot: goldenCarrot || (prev.goldenCarrot || false),
            obstaclesCleared: obstaclesCleared || (prev.obstaclesCleared || false)
        };

        // 解锁下一关
        if (game.currentLevel + 1 >= game.unlockedLevels) {
            game.unlockedLevels = Math.min(5, game.currentLevel + 2);
        }

        // 奖励道具 & 蛋
        let rewards = level.rewards || {};
        let eggsGained = 0;
        if (goldenCarrot && obstaclesCleared) {
            eggsGained = (rewards.eggs || 0) + 1;
        } else {
            eggsGained = rewards.eggs || 0;
        }
        for (let i = 0; i < eggsGained; i++) {
            let eggType = Math.floor(Math.random() * EGG_TYPES.length);
            game.eggs.push({ typeIdx: eggType, state: 'egg', progress: 0, feedProgress: 0 });
        }
        game.feedItems.milk = (game.feedItems.milk || 0) + (rewards.milk || 0);
        game.feedItems.cookie = (game.feedItems.cookie || 0) + (rewards.cookie || 0);

        // 检查隐藏关解锁条件
        checkHiddenUnlocks();

        // 保存数据
        saveSaveData();

        // 构建评价UI
        let ratingHtml = '';
        ratingHtml += `<div style="font-size:24px;margin:5px 0;">${'⭐'.repeat(stars)}${'☆'.repeat(3 - stars)}</div>`;
        if (goldenCarrot) ratingHtml += `<div style="color:#ffd700;font-weight:bold;">🏆 金西瓜！全程零伤害</div>`;
        if (obstaclesCleared) ratingHtml += `<div style="color:#4caf50;">✅ 道具全清</div>`;
        if (hiddenTaskDone) ratingHtml += `<div style="color:#e040fb;">🎯 隐藏任务完成！</div>`;

        let rewardHtml = `<div style="background:rgba(255,255,255,0.05);border-radius:8px;padding:10px;font-size:13px;color:#ddd;">
            <div style="color:#ffd700;font-weight:bold;margin-bottom:6px;">🎁 本关奖励</div>
            ${eggsGained > 0 ? `<div>🥚 怪物蛋 x${eggsGained}</div>` : ''}
            ${rewards.milk ? `<div>🥛 牛奶 x${rewards.milk}</div>` : ''}
            ${rewards.cookie ? `<div>🍪 饼干 x${rewards.cookie}</div>` : ''}
        </div>`;

        document.getElementById('winScore').textContent = `得分：${game.score}`;
        document.getElementById('winRating').innerHTML = ratingHtml;
        document.getElementById('winRewards').innerHTML = rewardHtml;
        document.getElementById('winScreen').classList.remove('hidden');
    }

    function checkHiddenUnlocks() {
        // 关卡6（果园迷阵）- 需要孵化1只怪物
        if (game.hatchedCount >= 1 && !game.hiddenUnlocked[5]) {
            game.hiddenUnlocked[5] = true;
            addFloatingText('🔓 果园迷阵已解锁!', 400, 200, '#e040fb');
        }
        // 关卡7（深海秘境）- 需要任意2关金萝卜+障碍全清
        let perfectCount = Object.values(game.levelStars).filter(s => s.goldenCarrot && s.obstaclesCleared).length;
        if (perfectCount >= 2 && !game.hiddenUnlocked[6]) {
            game.hiddenUnlocked[6] = true;
        }
    }

    // ======== 怪物窝系统 ========
    function openNest() {
        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('monsterNest').classList.remove('hidden');
        renderNest();
    }

    function closeNest() {
        document.getElementById('monsterNest').classList.add('hidden');
        document.getElementById('startScreen').classList.remove('hidden');
        renderLevelSelect();
    }

    function renderNest() {
        let html = `<div style="display:flex;justify-content:space-between;margin-bottom:10px;color:#aaa;font-size:13px;">
            <span>🥛 牛奶 x${game.feedItems.milk}</span>
            <span>🍪 饼干 x${game.feedItems.cookie}</span>
            <span>🐾 已孵化 ${game.hatchedCount}</span>
        </div>`;

        if (game.eggs.length === 0) {
            html += `<div style="text-align:center;color:#666;padding:20px;">还没有怪物蛋<br><span style="font-size:12px;">通关关卡可获得蛋</span></div>`;
        } else {
            game.eggs.forEach((egg, i) => {
                let et = EGG_TYPES[egg.typeIdx];
                let stateText = egg.state === 'egg' ? '🥚 等待孵化' : egg.state === 'hatching' ? '🐣 正在成长' : `${et.icon} 已长大`;
                html += `<div style="background:rgba(255,255,255,0.08);border-radius:10px;padding:10px;margin-bottom:8px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <span style="font-size:20px;">${egg.state === 'hatched' ? et.icon : '🥚'}</span>
                        <div style="flex:1;margin:0 10px;">
                            <div style="color:#fff;font-size:13px;">${et.name}</div>
                            <div style="color:#aaa;font-size:11px;">${stateText}</div>
                        </div>
                        ${egg.state === 'egg' ?
                            `<button onclick="feedEgg(${i},'milk')" style="font-size:11px;padding:4px 8px;background:rgba(255,255,255,0.1);border:1px solid #aaa;border-radius:5px;color:#fff;cursor:pointer;" ${game.feedItems.milk <= 0 ? 'disabled' : ''}>🥛 喂奶</button>` :
                            egg.state === 'hatching' ?
                            `<button onclick="feedEgg(${i},'cookie')" style="font-size:11px;padding:4px 8px;background:rgba(255,255,255,0.1);border:1px solid #aaa;border-radius:5px;color:#fff;cursor:pointer;" ${game.feedItems.cookie <= 0 ? 'disabled' : ''}>🍪 喂饼干</button>` :
                            `<span style="color:#ffd700;font-size:12px;">🎉 完成</span>`
                        }
                    </div>
                    ${egg.state !== 'hatched' ? `
                    <div style="height:6px;background:rgba(255,255,255,0.1);border-radius:3px;margin-top:6px;">
                        <div style="height:6px;background:${et.color};border-radius:3px;width:${Math.min(100, egg.state === 'egg' ? egg.progress * 10 : egg.feedProgress / egg.feedNeed * 100)}%;"></div>
                    </div>` : ''}
                </div>`;
            });
        }
        document.getElementById('nestContent').innerHTML = html;
    }

    function feedEgg(idx, foodType) {
        let egg = game.eggs[idx];
        if (!egg) return;
        if (foodType === 'milk' && egg.state === 'egg' && game.feedItems.milk > 0) {
            game.feedItems.milk--;
            egg.progress++;
            let et = EGG_TYPES[egg.typeIdx];
            if (egg.progress >= et.hatchTime) {
                egg.state = 'hatching';
                egg.feedProgress = 0;
                egg.feedNeed = et.feedNeed;
            }
        } else if (foodType === 'cookie' && egg.state === 'hatching' && game.feedItems.cookie > 0) {
            game.feedItems.cookie--;
            egg.feedProgress++;
            if (egg.feedProgress >= egg.feedNeed) {
                egg.state = 'hatched';
                game.hatchedCount++;
                checkHiddenUnlocks();
            }
        }
        saveSaveData();
        renderNest();
    }

    // ============ 渲染 ============
    function draw() {
        let level = LEVELS[game.currentLevel] || LEVELS[0];

        // Background
        ctx.fillStyle = level.bg;
        ctx.fillRect(0, 0, 800, 600);

        // Grid pattern
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        for (let x = 0; x <= COLS; x++) {
            ctx.beginPath(); ctx.moveTo(x * TILE, 0); ctx.lineTo(x * TILE, 600); ctx.stroke();
        }
        for (let y = 0; y <= ROWS; y++) {
            ctx.beginPath(); ctx.moveTo(0, y * TILE); ctx.lineTo(800, y * TILE); ctx.stroke();
        }

        // Draw path
        ctx.strokeStyle = level.pathColor;
        ctx.lineWidth = TILE - 4;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        for (let i = 0; i < level.path.length - 1; i++) {
            let [x1, y1] = level.path[i];
            let [x2, y2] = level.path[i + 1];
            let sx = x1 * TILE + TILE / 2;
            let sy = y1 * TILE + TILE / 2;
            let ex = x2 * TILE + TILE / 2;
            let ey = y2 * TILE + TILE / 2;
            if (i === 0) ctx.moveTo(sx, sy);
            else ctx.lineTo(sx, sy);
            ctx.lineTo(ex, ey);
        }
        ctx.stroke();

        // Path border
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = TILE;
        ctx.stroke();

        // Path fill on top
        ctx.strokeStyle = level.pathColor;
        ctx.lineWidth = TILE - 6;
        ctx.stroke();

        // Grid highlight for placement
        if (game.selectedType) {
            let rect = canvas.getBoundingClientRect();
            let mx = (mouseX - rect.left) * (800 / rect.width);
            let my = (mouseY - rect.top) * (600 / rect.height);
            let gx = Math.floor(mx / TILE);
            let gy = Math.floor(my / TILE);
            if (gx >= 0 && gx < COLS && gy >= 0 && gy < ROWS && game.grid[gx][gy] === 0) {
                ctx.fillStyle = 'rgba(255,215,0,0.3)';
                ctx.fillRect(gx * TILE, gy * TILE, TILE, TILE);
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                ctx.strokeRect(gx * TILE + 1, gy * TILE + 1, TILE - 2, TILE - 2);

                // Range preview
                let type = TOWER_TYPES[game.selectedType];
                ctx.beginPath();
                ctx.arc(gx * TILE + TILE/2, gy * TILE + TILE/2, type.levels[0].range, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255,215,0,0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.fillStyle = 'rgba(255,215,0,0.05)';
                ctx.fill();
            }
        }

        // Selected tower range
        if (game.selectedTower) {
            let t = game.selectedTower;
            let lv = TOWER_TYPES[t.type].levels[t.level];
            ctx.beginPath();
            ctx.arc(t.x, t.y, lv.range, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fill();

            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(t.gx * TILE, t.gy * TILE, TILE, TILE);
        }

        // Draw watermelon
        let cx = game.carrotPos.x;
        let cy = game.carrotPos.y + Math.sin(game.carrotAnim) * 3;
        ctx.save();
        ctx.translate(cx, cy);

        // Draw watermelon safe zone background
        ctx.fillStyle = 'rgba(255,235,59,0.08)';
        ctx.beginPath();
        ctx.arc(cx, cy, 28, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,235,59,0.25)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);

        // Eating animation - watermelon shakes and monster bites
        let shakeX = 0, shakeY = 0;
        let eatAlpha = 0;
        if (game.eatingAnim) {
            game.eatingTimer--;
            shakeX = (Math.random() - 0.5) * 8;
            shakeY = (Math.random() - 0.5) * 8;
            ctx.translate(shakeX, shakeY);
            eatAlpha = Math.min(1, game.eatingTimer / 15);

            if (game.eatingTimer <= 0) {
                game.eatingAnim = false;
                game.eatingMonster = null;
            }
        }

        // Watermelon body (circle)
        ctx.fillStyle = '#2e7d32';
        ctx.beginPath();
        ctx.arc(0, 0, 18, 0, Math.PI * 2);
        ctx.fill();

        // Watermelon stripes
        ctx.strokeStyle = '#1b5e20';
        ctx.lineWidth = 2.5;
        for (let i = -2; i <= 2; i++) {
            ctx.beginPath();
            ctx.arc(i * 7, 0, 18, -0.6, 0.6);
            ctx.stroke();
        }

        // Watermelon highlight
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.beginPath();
        ctx.ellipse(-5, -6, 8, 5, -0.5, 0, Math.PI * 2);
        ctx.fill();

        // Cute face
        // Eyes
        ctx.fillStyle = '#333';
        ctx.beginPath(); ctx.arc(-5, -3, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(5, -3, 2.5, 0, Math.PI * 2); ctx.fill();
        // Eye highlights
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-4, -4, 1, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(6, -4, 1, 0, Math.PI * 2); ctx.fill();
        // Blush
        ctx.fillStyle = 'rgba(255,100,100,0.4)';
        ctx.beginPath(); ctx.ellipse(-9, 3, 4, 2.5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(9, 3, 4, 2.5, 0, 0, Math.PI * 2); ctx.fill();
        // Smile
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(0, 0, 5, 0.2, Math.PI - 0.2);
        ctx.stroke();

        // Eating damage indicator - bite marks
        if (game.carrotHp < game.maxCarrotHp) {
            let damagePct = 1 - (game.carrotHp / game.maxCarrotHp);
            ctx.fillStyle = '#ff5252';
            ctx.globalAlpha = damagePct * 0.8;
            let biteSize = 5 + damagePct * 10;
            // Multiple bite marks
            ctx.beginPath();
            ctx.arc(12, 6, biteSize, 0, Math.PI * 2);
            ctx.fill();
            if (damagePct > 0.3) {
                ctx.beginPath();
                ctx.arc(-10, 8, biteSize * 0.6, 0, Math.PI * 2);
                ctx.fill();
            }
            if (damagePct > 0.6) {
                ctx.beginPath();
                ctx.arc(5, -14, biteSize * 0.5, 0, Math.PI * 2);
                ctx.fill();
            }
            // Red flesh exposed
            ctx.fillStyle = '#e53935';
            ctx.beginPath();
            ctx.arc(12, 6, biteSize * 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;

            // Sad face when hurt
            if (damagePct > 0.3) {
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1.5;
                // Change smile to frown
                ctx.beginPath();
                ctx.arc(0, 8, 5, Math.PI + 0.2, -0.2);
                ctx.stroke();
                // Tears
                ctx.fillStyle = '#42a5f5';
                ctx.globalAlpha = damagePct;
                ctx.beginPath();
                ctx.ellipse(-7, 1, 1.5, 3, 0.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(7, 1, 1.5, 3, -0.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // Eating animation - monster chomping overlay
        if (game.eatingAnim && game.eatingMonster) {
            let em = game.eatingMonster;
            let chompPhase = Math.sin(game.eatingTimer * 0.4);
            // Monster body approaching from right
            let monsterX = 22 - eatAlpha * 4;
            ctx.fillStyle = em.color;
            ctx.globalAlpha = eatAlpha;
            ctx.beginPath();
            ctx.arc(monsterX, 2, em.size * 0.9, 0, Math.PI * 2);
            ctx.fill();
            // Monster eyes (angry)
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(monsterX - 3, -2, 3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#333';
            ctx.beginPath(); ctx.arc(monsterX - 2, -2, 1.5, 0, Math.PI * 2); ctx.fill();
            // Teeth (chomping)
            ctx.fillStyle = '#fff';
            let teethOpen = Math.abs(chompPhase) * 3;
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                let tx = monsterX - 10 + i * 5;
                ctx.moveTo(tx, 8 + teethOpen);
                ctx.lineTo(tx + 2, 8 + teethOpen + 4);
                ctx.lineTo(tx + 4, 8 + teethOpen);
                ctx.fill();
            }
            // Muzzle flash effect
            ctx.fillStyle = 'rgba(255,82,82,0.4)';
            ctx.beginPath();
            ctx.arc(10, 5, 8 + Math.random() * 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            // Chomp particles
            if (game.eatingTimer % 3 === 0) {
                addParticles(cx + 12, cy + 5, '#ff5252', 3);
            }
        }

        ctx.restore();

        // HP bar for carrot
        let hpPct = game.carrotHp / game.maxCarrotHp;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(cx - 20, cy - 30, 40, 5);
        ctx.fillStyle = hpPct > 0.5 ? '#4caf50' : hpPct > 0.25 ? '#ff9800' : '#f44336';
        ctx.fillRect(cx - 20, cy - 30, 40 * hpPct, 5);

        // Draw obstacles
        for (let ob of game.obstacles) {
            if (ob.hp <= 0) continue;
            let obType = OBSTACLE_TYPES[ob.type];
            let ox = ob.x * TILE, oy = ob.y * TILE;
            // 背景
            ctx.fillStyle = obType.color + '50';
            ctx.fillRect(ox + 2, oy + 2, TILE - 4, TILE - 4);
            ctx.strokeStyle = obType.color;
            ctx.lineWidth = 2;
            ctx.strokeRect(ox + 2, oy + 2, TILE - 4, TILE - 4);
            // 图标
            ctx.font = '18px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(obType.icon, ox + TILE / 2, oy + TILE / 2 - 3);
            // 费用提示
            ctx.font = '9px Microsoft YaHei';
            ctx.fillStyle = '#ffd700';
            ctx.fillText(`💰${obType.cost}`, ox + TILE / 2, oy + TILE - 8);
            // HP条
            let hpPctOb = ob.hp / ob.maxHp;
            if (hpPctOb < 1) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(ox + 4, oy + 3, TILE - 8, 3);
                ctx.fillStyle = '#4caf50';
                ctx.fillRect(ox + 4, oy + 3, (TILE - 8) * hpPctOb, 3);
            }
        }

        // Draw towers
        for (let t of game.towers) {
            let type = TOWER_TYPES[t.type];
            let lv = type.levels[t.level];

            // Base
            ctx.fillStyle = type.color + '40';
            ctx.strokeStyle = type.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(t.x, t.y, 16, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Tower body
            ctx.fillStyle = type.color;
            ctx.beginPath();
            ctx.arc(t.x, t.y, 12, 0, Math.PI * 2);
            ctx.fill();

            // Level indicator
            if (t.level > 0) {
                for (let i = 0; i <= t.level; i++) {
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.arc(t.x - 6 + i * 6, t.y + 18, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Turret direction
            ctx.save();
            ctx.translate(t.x, t.y);
            ctx.rotate(t.angle);
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, -2, 16, 4);
            ctx.beginPath();
            ctx.arc(16, 0, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Icon
            ctx.font = '14px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(type.icon, t.x, t.y);
        }

        // Draw monsters
        for (let m of game.monsters) {
            if (!m.alive) continue;

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(m.x, m.y + m.size + 2, m.size * 0.8, m.size * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();

            // Body
            ctx.fillStyle = m.color;
            ctx.beginPath();
            ctx.arc(m.x, m.y, m.size, 0, Math.PI * 2);
            ctx.fill();

            // Outline
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Slow effect
            if (m.slow > 0) {
                ctx.strokeStyle = '#4fc3f7';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(m.x, m.y, m.size + 3, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Eyes
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(m.x - 3, m.y - 2, 3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(m.x + 3, m.y - 2, 3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#333';
            ctx.beginPath(); ctx.arc(m.x - 2, m.y - 2, 1.5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(m.x + 4, m.y - 2, 1.5, 0, Math.PI * 2); ctx.fill();

            // HP bar
            if (m.hp < m.maxHp) {
                let w = m.size * 2;
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(m.x - w/2, m.y - m.size - 8, w, 4);
                ctx.fillStyle = m.hp / m.maxHp > 0.5 ? '#4caf50' : m.hp / m.maxHp > 0.25 ? '#ff9800' : '#f44336';
                ctx.fillRect(m.x - w/2, m.y - m.size - 8, w * (m.hp / m.maxHp), 4);
            }
        }

        // Draw bullets
        for (let b of game.bullets) {
            ctx.fillStyle = b.color;
            ctx.beginPath();
            ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(b.x, b.y, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        // Draw effects
        for (let e of game.effects) {
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.maxRadius * (1 - e.life), 0, Math.PI * 2);
            ctx.strokeStyle = e.color + Math.floor(e.life * 128).toString(16).padStart(2, '0');
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // Draw particles
        for (let p of game.particles) {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Draw floating texts
        for (let ft of game.floatingTexts) {
            ctx.globalAlpha = ft.life;
            ctx.fillStyle = ft.color;
            ctx.font = 'bold 14px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.fillText(ft.text, ft.x, ft.y);
        }
        ctx.globalAlpha = 1;
    }

    // ============ 鼠标 & 触摸交互 ============
    let mouseX = 0, mouseY = 0;

    canvas.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    canvas.addEventListener('click', (e) => {
        if (!game.running) return;
        let rect = canvas.getBoundingClientRect();
        let mx = (e.clientX - rect.left) * (800 / rect.width);
        let my = (e.clientY - rect.top) * (600 / rect.height);
        handleCanvasTap(mx, my);
    });

    // 触摸事件
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        let touch = e.touches[0];
        mouseX = touch.clientX;
        mouseY = touch.clientY;
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        let touch = e.touches[0];
        mouseX = touch.clientX;
        mouseY = touch.clientY;
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (!game.running) return;
        let rect = canvas.getBoundingClientRect();
        let mx = (mouseX - rect.left) * (800 / rect.width);
        let my = (mouseY - rect.top) * (600 / rect.height);
        handleCanvasTap(mx, my);
    }, { passive: false });

    function handleCanvasTap(mx, my) {
        let gx = Math.floor(mx / TILE);
        let gy = Math.floor(my / TILE);

        if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return;

        // Check if clicked on a tower
        let clickedTower = null;
        for (let t of game.towers) {
            if (t.gx === gx && t.gy === gy) {
                clickedTower = t;
                break;
            }
        }

        if (clickedTower) {
            game.selectedTower = game.selectedTower === clickedTower ? null : clickedTower;
            game.selectedType = null;
            document.querySelectorAll('.tower-btn').forEach(btn => btn.classList.remove('selected'));
        } else if (game.grid[gx][gy] === 3) {
            // 点击障碍物 - 攻击它
            attackObstacle(gx, gy);
        } else if (game.selectedType && game.grid[gx][gy] === 0) {
            placeTower(gx, gy);
        } else {
            game.selectedTower = null;
        }
        updateUI();
    }

    // 攻击障碍物
    function attackObstacle(gx, gy) {
        let ob = game.obstacles.find(o => o.x === gx && o.y === gy && o.hp > 0);
        if (!ob) return;
        let obType = OBSTACLE_TYPES[ob.type];
        let cost = obType.cost;
        if (game.gold < cost) {
            addFloatingText('金币不足!', gx * TILE + TILE / 2, gy * TILE, '#ff5252');
            return;
        }
        game.gold -= cost;
        ob.hp = 0;
        game.grid[gx][gy] = 0;
        game.clearedObstacles++;
        addParticles(gx * TILE + TILE / 2, gy * TILE + TILE / 2, obType.color, 12);
        addFloatingText(`+50💰 清除${obType.name}`, gx * TILE + TILE / 2, gy * TILE - 10, '#4caf50');
        game.gold += 50; // 清除奖励
        updateUI();
    }

    // ============ 游戏循环 ============
    function gameLoop() {
        if (game.running && !game.paused) {
            update();
        }
        if (game.currentLevel !== undefined && LEVELS[game.currentLevel]) {
            draw();
            // 暂停遮罩
            if (game.paused && game.running) {
                ctx.fillStyle = 'rgba(0,0,0,0.55)';
                ctx.fillRect(0, 0, 800, 600);
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 48px Microsoft YaHei';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⏸ 游戏暂停', 400, 280);
                ctx.font = '18px Microsoft YaHei';
                ctx.fillStyle = '#aaa';
                ctx.fillText('点击「继续」恢复游戏', 400, 335);
            }
        }
        requestAnimationFrame(gameLoop);
    }

    // ============ 启动 ============
    loadSaveData();
    showStart();
    resizeCanvas();
    gameLoop();
    </script>
</body>
</html>
