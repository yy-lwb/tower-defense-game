<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>保卫西瓜 - 塔防游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            /* 修复 iOS Safari safe area 遮挡 */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        #gameContainer {
            position: relative;
            display: flex;
            gap: 0;
            max-width: 100vw;
            max-height: 100vh;
            max-height: 100dvh;
        }
        canvas {
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(255,200,100,0.3);
            display: block;
            touch-action: none;
        }
        #sidebar {
            width: 220px;
            background: rgba(20,20,40,0.95);
            border-radius: 0 12px 12px 0;
            padding: 15px 12px;
            color: #fff;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 2px solid rgba(255,200,100,0.2);
            border-left: none;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .panel-title {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
            padding-bottom: 8px;
            border-bottom: 2px solid rgba(255,215,0,0.3);
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            padding: 4px 0;
        }
        .info-label { color: #aaa; }
        .info-value { color: #ffd700; font-weight: bold; }
        .tower-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.05);
            touch-action: manipulation;
        }
        .tower-btn:hover { border-color: #ffd700; background: rgba(255,215,0,0.1); }
        .tower-btn.selected { border-color: #ffd700; background: rgba(255,215,0,0.2); box-shadow: 0 0 10px rgba(255,215,0,0.3); }
        .tower-btn.disabled { opacity: 0.4; cursor: not-allowed; }
        .tower-icon {
            width: 36px; height: 36px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .tower-info { flex: 1; }
        .tower-name { font-size: 13px; font-weight: bold; color: #fff; }
        .tower-cost { font-size: 11px; color: #ffd700; }
        .tower-desc { font-size: 10px; color: #888; margin-top: 2px; }
        .btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .btn-start {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #333;
        }
        .btn-start:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(255,215,0,0.5); }
        .btn-upgrade {
            background: linear-gradient(135deg, #00c853, #00e676);
            color: #fff;
            font-size: 12px;
            padding: 8px;
        }
        .btn-sell {
            background: linear-gradient(135deg, #ff5252, #ff1744);
            color: #fff;
            font-size: 12px;
            padding: 8px;
        }
        #startScreen, #gameOverScreen, #winScreen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            z-index: 10;
        }
        #monsterNest, #unlockGuide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 16px;
            overflow-y: auto;
            border-radius: 12px;
            z-index: 15;
        }
        #startScreen h1, #winScreen h1 {
            font-size: 48px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            margin-bottom: 10px;
        }
        #gameOverScreen h1 {
            font-size: 48px;
            color: #ff5252;
            text-shadow: 0 0 20px rgba(255,82,82,0.5);
            margin-bottom: 10px;
        }
        .subtitle {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .level-select {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .level-btn {
            width: 60px; height: 60px;
            border: 3px solid rgba(255,215,0,0.4);
            border-radius: 10px;
            background: rgba(255,215,0,0.1);
            color: #ffd700;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .level-btn:hover { border-color: #ffd700; background: rgba(255,215,0,0.3); transform: scale(1.1); }
        .level-btn.locked { opacity: 0.3; cursor: not-allowed; }
        .hidden { display: none !important; }
        .speed-btn {
            font-size: 11px;
            padding: 5px 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            touch-action: manipulation;
        }
        .speed-btn:hover { background: rgba(255,215,0,0.2); border-color: #ffd700; }
        .speed-btn.paused-active {
            background: rgba(100,255,100,0.15);
            border-color: #4caf50;
            color: #a5d6a7;
            box-shadow: 0 0 8px rgba(76,175,80,0.4);
        }
        /* 暂停时侧边栏顶部提示条 */
        #pauseHint {
            display: none;
            background: linear-gradient(90deg, rgba(76,175,80,0.2), rgba(100,200,100,0.1));
            border: 1px solid rgba(76,175,80,0.4);
            border-radius: 6px;
            padding: 5px 8px;
            font-size: 11px;
            color: #a5d6a7;
            text-align: center;
            line-height: 1.4;
        }
        #pauseHint.visible { display: block; }
        #towerDetail {
            padding: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 2px 0;
        }
        .detail-label { color: #aaa; }
        .detail-value { color: #fff; }

        /* ===== 移动端适配 ===== */
        @media (max-width: 1024px) {
            body {
                align-items: flex-start;
                justify-content: flex-start;
                /* safe area 已在 body padding 处理 */
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
            }
            #gameContainer {
                flex-direction: column;
                width: 100vw;
                height: 100vh;
                height: 100dvh;
            }
            canvas {
                border-radius: 0;
                flex-shrink: 0;
            }
            #sidebar {
                width: 100%;
                border-radius: 0;
                border-left: 2px solid rgba(255,200,100,0.2);
                border-top: none;
                flex-direction: column;
                padding: 8px 10px;
                gap: 6px;
                max-height: 45vh;
                overflow-y: auto;
                /* safe area for sidebar bottom */
                padding-bottom: max(8px, env(safe-area-inset-bottom));
            }
            .panel-title { font-size: 13px; padding-bottom: 4px; }
            .info-row { font-size: 12px; padding: 2px 0; }
            #towerShop {
                display: flex;
                gap: 6px;
                overflow-x: auto;
                padding-bottom: 4px;
                -webkit-overflow-scrolling: touch;
            }
            #towerShop::-webkit-scrollbar { display: none; }
            .tower-btn {
                flex-direction: column;
                min-width: 80px;
                gap: 4px;
                padding: 6px;
                flex-shrink: 0;
            }
            .tower-icon { width: 30px; height: 30px; font-size: 16px; }
            .tower-desc { display: none; }
            .tower-name { font-size: 11px; }
            .tower-cost { font-size: 10px; }
            #towerDetail .panel-title { font-size: 11px; }
            .detail-row { font-size: 11px; }
            .btn { padding: 8px; font-size: 13px; }
            .btn-upgrade, .btn-sell { padding: 6px; font-size: 11px; }
            .speed-btn { padding: 6px 12px; font-size: 12px; }

            #startScreen, #gameOverScreen, #winScreen {
                width: 100%;
                height: 100%;
                border-radius: 0;
                padding: 20px;
            }
            #startScreen h1, #winScreen h1 {
                font-size: 32px;
            }
            #gameOverScreen h1 {
                font-size: 32px;
            }
            .subtitle { font-size: 14px; margin-bottom: 20px; }
            .level-btn {
                width: 50px; height: 50px;
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .info-row { font-size: 11px; }
            .tower-btn { min-width: 70px; padding: 5px; }
            .tower-icon { width: 26px; height: 26px; font-size: 14px; }
            .tower-name { font-size: 10px; }
            #startScreen h1, #winScreen h1 { font-size: 26px; }
            #gameOverScreen h1 { font-size: 26px; }
            .level-btn { width: 44px; height: 44px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <!-- 开始界面 -->
        <div id="startScreen">
            <h1>🍉 保卫西瓜</h1>
            <p class="subtitle">选择关卡开始游戏</p>
            <div class="level-select" id="levelSelect"></div>
            <!-- 解锁进度展示 -->
            <div id="unlockProgress" style="width:90%;max-width:420px;margin:8px 0;"></div>
            <div style="display:flex;gap:10px;margin-top:4px;">
                <button class="btn" style="background:linear-gradient(135deg,#7c4dff,#e040fb);color:#fff;font-size:13px;" onclick="openNest()">🥚 怪物窝</button>
                <button class="btn" style="background:linear-gradient(135deg,#00796b,#26a69a);color:#fff;font-size:13px;" onclick="showUnlockGuide()">🔑 解锁指南</button>
            </div>
            <p style="color:#666;font-size:11px;margin-top:8px;">💡 满足条件可解锁隐藏关卡</p>
        </div>

        <!-- 游戏结束界面 -->
        <div id="gameOverScreen" class="hidden">
            <h1>💀 游戏结束</h1>
            <p class="subtitle">西瓜被怪物吃掉了...</p>
            <p style="color:#ffd700;font-size:18px;margin-bottom:20px;" id="overScore"></p>
            <button class="btn btn-start" onclick="showStart()">重新开始</button>
        </div>

        <!-- 胜利界面 -->
        <div id="winScreen" class="hidden">
            <h1>🎉 关卡通过！</h1>
            <p class="subtitle">西瓜安全了！</p>
            <div id="winRating" style="margin-bottom:10px;"></div>
            <p style="color:#ffd700;font-size:18px;margin-bottom:10px;" id="winScore"></p>
            <div id="winRewards" style="margin-bottom:15px;"></div>
            <div style="display:flex;gap:12px;">
                <button class="btn btn-start" onclick="nextLevel()">下一关</button>
                <button class="btn" style="background:rgba(255,255,255,0.1);color:#fff;" onclick="showStart()">返回</button>
            </div>
        </div>

        <!-- 怪物窝界面 -->
        <div id="monsterNest" class="hidden" style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;overflow-y:auto;z-index:20;border-radius:12px;">
            <h1 style="font-size:32px;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,0.5);margin-bottom:4px;">🥚 怪物窝</h1>
            <p style="color:#aaa;font-size:13px;margin-bottom:12px;">孵化并喂养你的怪物，解锁隐藏关卡</p>
            <div id="nestContent" style="width:100%;max-width:420px;"></div>
            <button class="btn btn-start" style="margin-top:12px;" onclick="closeNest()">← 返回</button>
        </div>

        <!-- 解锁指南弹窗 -->
        <div id="unlockGuide" class="hidden" style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;overflow-y:auto;z-index:20;border-radius:12px;">
            <h1 style="font-size:28px;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,0.5);margin-bottom:4px;">🔑 隐藏关卡解锁指南</h1>
            <div id="unlockGuideContent" style="width:100%;max-width:440px;margin-top:10px;"></div>
            <button class="btn btn-start" style="margin-top:15px;" onclick="closeUnlockGuide()">← 返回</button>
        </div>

        <!-- 通关新解锁提示弹窗 -->
        <div id="newUnlockPopup" class="hidden" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,rgba(20,10,60,0.98),rgba(10,30,60,0.98));border:2px solid #e040fb;border-radius:16px;padding:20px;z-index:30;min-width:260px;text-align:center;box-shadow:0 0 30px rgba(224,64,251,0.5);">
            <div style="font-size:32px;margin-bottom:8px;">🎉</div>
            <div style="color:#e040fb;font-weight:bold;font-size:16px;margin-bottom:6px;">解锁新关卡！</div>
            <div id="newUnlockText" style="color:#ddd;font-size:13px;margin-bottom:14px;"></div>
            <button class="btn" style="background:linear-gradient(135deg,#e040fb,#7c4dff);color:#fff;" onclick="closeUnlockPopup()">太好了！</button>
        </div>

        <!-- 侧边栏 -->
        <div id="sidebar">
            <div class="panel-title">🍉 保卫西瓜</div>
            <div style="text-align:center;padding:4px 0;">
                <span style="color:#ff9800;font-size:13px;font-weight:bold;" id="levelInfoDisplay">第1关 · 绿野仙踪</span>
                <div id="ratingDisplay" style="margin-top:2px;"></div>
            </div>
            <div>
                <div class="info-row">
                    <span class="info-label">💰 金币</span>
                    <span class="info-value" id="goldDisplay">200</span>
                </div>
                <div class="info-row">
                    <span class="info-label">❤️ 生命</span>
                    <span class="info-value" id="livesDisplay">20</span>
                </div>
                <div class="info-row">
                    <span class="info-label">🌊 波次</span>
                    <span class="info-value" id="waveDisplay">0/0</span>
                </div>
                <div class="info-row">
                    <span class="info-label">⭐ 得分</span>
                    <span class="info-value" id="scoreDisplay">0</span>
                </div>
                <div class="info-row">
                    <span class="info-label">🥚 怪物蛋</span>
                    <span class="info-value" id="eggDisplay">0</span>
                </div>
                <div class="info-row" id="obstacleRow" style="display:none;">
                    <span class="info-label">🧱 障碍物</span>
                    <span class="info-value" id="obstacleDisplay">0/0</span>
                </div>
            </div>
            <div id="pauseHint">⏸ 已暂停<br>🔨 可以放置炮塔！</div>
            <div class="panel-title" style="font-size:13px;margin-top:5px;">🔨 炮塔商店</div>
            <div id="towerShop"></div>
            <div id="towerDetail" class="hidden">
                <div class="panel-title" style="font-size:12px;">📊 炮塔信息</div>
                <div class="detail-row"><span class="detail-label">名称</span><span class="detail-value" id="detailName">-</span></div>
                <div class="detail-row"><span class="detail-label">等级</span><span class="detail-value" id="detailLevel">-</span></div>
                <div class="detail-row"><span class="detail-label">伤害</span><span class="detail-value" id="detailDmg">-</span></div>
                <div class="detail-row"><span class="detail-label">攻速</span><span class="detail-value" id="detailSpeed">-</span></div>
                <div class="detail-row"><span class="detail-label">范围</span><span class="detail-value" id="detailRange">-</span></div>
                <div style="display:flex;gap:6px;margin-top:8px;">
                    <button class="btn btn-upgrade" style="flex:1;" onclick="upgradeTower()">⬆ 升级</button>
                    <button class="btn btn-sell" style="flex:1;" onclick="sellTower()">💰 出售</button>
                </div>
            </div>
            <div style="display:flex;gap:6px;margin-top:auto;">
                <button class="btn btn-start" style="flex:1;" id="startWaveBtn" onclick="startWave()">▶ 开始</button>
                <button class="speed-btn" onclick="togglePause()" id="pauseBtn">⏸ 暂停</button>
                <button class="speed-btn" onclick="toggleSpeed()" id="speedBtn">1x</button>
            </div>
        </div>
    </div>

    <script>
    // roundRect polyfill for older browsers
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (typeof r === 'number') r = [r, r, r, r];
            let [tl, tr, br, bl] = Array.isArray(r) ? r.concat([r[0]||0,r[0]||0,r[0]||0]).slice(0,4) : [0,0,0,0];
            this.moveTo(x + tl, y);
            this.lineTo(x + w - tr, y);
            this.quadraticCurveTo(x + w, y, x + w, y + tr);
            this.lineTo(x + w, y + h - br);
            this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
            this.lineTo(x + bl, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - bl);
            this.lineTo(x, y + tl);
            this.quadraticCurveTo(x, y, x + tl, y);
            this.closePath();
            return this;
        };
    }

    // ============ 画布自适应缩放 ============
    function resizeCanvas() {
        let isMobile = window.innerWidth <= 1024;
        let container = document.getElementById('gameContainer');

        if (isMobile) {
            let sidebar = document.getElementById('sidebar');
            let sidebarH = sidebar ? sidebar.offsetHeight : 250;
            let safeTop = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sat')) || 0;
            let safeBottom = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sab')) || 0;
            let availW = window.innerWidth;
            let availH = window.innerHeight - sidebarH - safeTop - safeBottom;
            let scale = Math.min(availW / 800, availH / 600);
            let w = Math.floor(800 * scale);
            let h = Math.floor(600 * scale);
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            canvas.style.margin = '0 auto';
        } else {
            canvas.style.width = '800px';
            canvas.style.height = '600px';
        }
    }
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));

    // 阻止移动端默认手势（缩放、滚动等）
    document.addEventListener('touchmove', function(e) {
        if (e.target === canvas || e.target.closest('#gameContainer')) {
            e.preventDefault();
        }
    }, { passive: false });

    // ============ 游戏配置 ============
    const TILE = 40;
    const COLS = 20, ROWS = 15;
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ============ 炮塔定义 ============
    const TOWER_TYPES = {
        bottle: {
            name: '瓶子塔', icon: '🧴', color: '#4fc3f7', cost: 80,
            desc: '单体攻击，攻速快',
            damage: 15, range: 120, fireRate: 800, bulletSpeed: 5, bulletColor: '#4fc3f7',
            bulletType: 'bottle',
            levels: [
                { damage: 15, range: 120, fireRate: 800 },
                { damage: 25, range: 140, fireRate: 700, upgradeCost: 60 },
                { damage: 40, range: 160, fireRate: 600, upgradeCost: 100 }
            ]
        },
        fan: {
            name: '风扇塔', icon: '🌀', color: '#81c784', cost: 120,
            desc: '范围攻击，减速敌人',
            damage: 8, range: 100, fireRate: 1200, bulletSpeed: 3, bulletColor: '#81c784',
            bulletType: 'fan',
            splash: 60, slow: 0.5,
            levels: [
                { damage: 8, range: 100, fireRate: 1200, splash: 60, slow: 0.5 },
                { damage: 14, range: 120, fireRate: 1000, splash: 70, slow: 0.6, upgradeCost: 80 },
                { damage: 22, range: 140, fireRate: 800, splash: 80, slow: 0.7, upgradeCost: 140 }
            ]
        },
        rocket: {
            name: '火箭塔', icon: '🚀', color: '#ef5350', cost: 150,
            desc: '高伤害，爆炸范围大',
            damage: 40, range: 150, fireRate: 2000, bulletSpeed: 4, bulletColor: '#ef5350',
            bulletType: 'rocket',
            splash: 80,
            levels: [
                { damage: 40, range: 150, fireRate: 2000, splash: 80 },
                { damage: 65, range: 170, fireRate: 1800, splash: 100, upgradeCost: 100 },
                { damage: 100, range: 200, fireRate: 1500, splash: 120, upgradeCost: 180 }
            ]
        },
        star: {
            name: '星星塔', icon: '⭐', color: '#ffd740', cost: 100,
            desc: '随机攻击，伤害高',
            damage: 30, range: 130, fireRate: 1500, bulletSpeed: 6, bulletColor: '#ffd740',
            bulletType: 'star',
            levels: [

    function loadSaveData() {
        try {
            let data = JSON.parse(localStorage.getItem('watermelon_save'));
            if (data) {
                game.unlockedLevels = data.unlockedLevels || 1;
                game.eggs = data.eggs || [];
                game.feedItems = data.feedItems || { milk: 0, cookie: 0 };
                game.hatchedCount = data.hatchedCount || 0;
                game.levelStars = data.levelStars || {};
                game.hiddenUnlocked = data.hiddenUnlocked || {};
            }
        } catch(e) {}
    }

    function saveSaveData() {
        try {
            localStorage.setItem('watermelon_save', JSON.stringify({
                unlockedLevels: game.unlockedLevels,
                eggs: game.eggs,
                feedItems: game.feedItems,
                hatchedCount: game.hatchedCount,
                levelStars: game.levelStars,
                hiddenUnlocked: game.hiddenUnlocked
            }));
        } catch(e) {}
    }

    function dist(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); }

    function lerp(a, b, t) { return a + (b - a) * t; }

    function generatePathPixels(path) {
        let pixels = [];
        for (let i = 0; i < path.length - 1; i++) {
            let [x1, y1] = path[i];
            let [x2, y2] = path[i + 1];
            let sx = x1 * TILE + TILE / 2;
            let sy = y1 * TILE + TILE / 2;
            let ex = x2 * TILE + TILE / 2;
            let ey = y2 * TILE + TILE / 2;
            let d = dist(sx, sy, ex, ey);
            let steps = Math.ceil(d / 4);
            for (let j = 0; j <= steps; j++) {
                pixels.push({ x: lerp(sx, ex, j / steps), y: lerp(sy, ey, j / steps) });
            }
        }
        return pixels;
    }

    function generatePathGrid(path) {
        let set = new Set();
        for (let i = 0; i < path.length - 1; i++) {
            let [x1, y1] = path[i];
            let [x2, y2] = path[i + 1];
            let sx = Math.max(0, Math.min(x1, x2));
            let sy = Math.max(0, Math.min(y1, y2));
            let ex = Math.max(x1, x2);
            let ey = Math.max(y1, y2);
            for (let x = sx; x <= Math.min(ex, COLS - 1); x++) {
                for (let y = sy; y <= Math.min(ey, ROWS - 1); y++) {
                    set.add(`${x},${y}`);
                }
            }
        }
        return set;
    }

    // ============ 关卡初始化 ============
    function initLevel(levelIdx) {
        let level = LEVELS[levelIdx];
        game.currentLevel = levelIdx;
        game.gold = level.startGold;
        game.lives = 20;
        game.score = 0;
        game.currentWave = 0;
        game.waveActive = false;
        game.towers = [];
        game.monsters = [];
        game.bullets = [];
        game.effects = [];
        game.particles = [];
        game.floatingTexts = [];
        game.selectedTower = null;
        game.selectedType = null;
        game.carrotHp = 20;
        game.maxCarrotHp = 20;
        game.paused = false;
        game.speed = 1;
        game.damageTaken = 0;
        game.levelStartTime = Date.now();
        game.towerTypesUsed = {};
        game.secretPortalActive = false;
        game.bossKillCount = 0;
        document.getElementById('pauseBtn').textContent = '⏸ 暂停';
        document.getElementById('pauseBtn').classList.remove('paused-active');
        let pauseHint = document.getElementById('pauseHint');
        if (pauseHint) pauseHint.classList.remove('visible');

        // 初始化障碍物
        game.obstacles = [];
        game.totalObstacles = 0;
        game.clearedObstacles = 0;
        if (level.obstacles) {
            level.obstacles.forEach(ob => {
                game.obstacles.push({
                    x: ob.x, y: ob.y,
                    type: ob.type,
                    hp: OBSTACLE_TYPES[ob.type].hp,
                    maxHp: OBSTACLE_TYPES[ob.type].hp
                });
            });
            game.totalObstacles = level.obstacles.length;
        }

        game.pathPixels = generatePathPixels(level.path);
        game.pathGrid = generatePathGrid(level.path);
        game.grid = [];
        for (let x = 0; x < COLS; x++) {
            game.grid[x] = [];
            for (let y = 0; y < ROWS; y++) {
                if (game.pathGrid.has(`${x},${y}`)) {
                    game.grid[x][y] = 1;
                } else if (game.obstacles.some(ob => ob.x === x && ob.y === y)) {
                    game.grid[x][y] = 3; // obstacle
                } else {
                    game.grid[x][y] = 0;
                }
            }
        }

        let lastP = level.path[level.path.length - 1];
        game.carrotPos = { x: lastP[0] * TILE + TILE / 2, y: lastP[1] * TILE + TILE / 2 };
        game.running = true;

        updateUI();
        renderTowerShop();
        document.getElementById('speedBtn').textContent = '1x';
        document.getElementById('levelInfoDisplay').textContent = `第${levelIdx + 1}关 · ${level.name}`;
        if (game.totalObstacles > 0) {
            document.getElementById('obstacleRow').style.display = 'flex';
        } else {
            document.getElementById('obstacleRow').style.display = 'none';
        }
        // 显示已有评价
        let stars = game.levelStars[levelIdx];
        document.getElementById('ratingDisplay').innerHTML = stars ?
            `${stars.goldenCarrot ? '🏆' : '⭐'} ${stars.stars}星${stars.goldenCarrot ? ' · 金西瓜' : ''}${stars.obstaclesCleared ? ' · 道具全清' : ''}` : '';

        // 检查隐藏任务提示
        if (level.hiddenTask) {
            document.getElementById('ratingDisplay').innerHTML += `<br><span style="font-size:10px;color:#aaa;">🎯 ${level.hiddenTask.desc}</span>`;
        }
        if (level.secretTrigger) {
            document.getElementById('ratingDisplay').innerHTML += `<br><span style="font-size:10px;color:#aaa;">🔑 ${level.secretTrigger.desc}</span>`;
        }
    }

    // ============ UI 渲染 ============
    function updateUI() {
        document.getElementById('goldDisplay').textContent = game.gold;
        document.getElementById('livesDisplay').textContent = game.lives;
        document.getElementById('scoreDisplay').textContent = game.score;
        document.getElementById('eggDisplay').textContent = game.eggs.length;
        let level = LEVELS[game.currentLevel];
        document.getElementById('waveDisplay').textContent = `${game.currentWave}/${level.waves.length}`;
        document.getElementById('startWaveBtn').textContent = game.waveActive ? '🌊 进行中' : '▶ 开始';

        // 障碍物计数
        if (game.totalObstacles > 0) {
            document.getElementById('obstacleDisplay').textContent = `${game.clearedObstacles}/${game.totalObstacles}`;
        }

        // Update tower button states
        document.querySelectorAll('.tower-btn').forEach(btn => {
            let type = btn.dataset.type;
            let cost = TOWER_TYPES[type].cost;
            if (game.gold < cost) btn.classList.add('disabled');
            else btn.classList.remove('disabled');
        });

        // Tower detail
        if (game.selectedTower) {
            document.getElementById('towerDetail').classList.remove('hidden');
            let t = game.selectedTower;
            let lv = t.level;
            document.getElementById('detailName').textContent = TOWER_TYPES[t.type].name;
            document.getElementById('detailLevel').textContent = `Lv.${lv + 1}`;
            document.getElementById('detailDmg').textContent = TOWER_TYPES[t.type].levels[lv].damage;
            document.getElementById('detailSpeed').textContent = (TOWER_TYPES[t.type].levels[lv].fireRate / 1000).toFixed(1) + 's';
            document.getElementById('detailRange').textContent = TOWER_TYPES[t.type].levels[lv].range;
        } else {
            document.getElementById('towerDetail').classList.add('hidden');
        }
    }

    function renderTowerShop() {
        let html = '';
        for (let [key, t] of Object.entries(TOWER_TYPES)) {
            html += `<div class="tower-btn" data-type="${key}" onclick="selectTowerType('${key}')">
                <div class="tower-icon" style="background:${t.color}30;border:2px solid ${t.color}">${t.icon}</div>
                <div class="tower-info">
                    <div class="tower-name">${t.name}</div>
                    <div class="tower-cost">💰 ${t.cost}</div>
                    <div class="tower-desc">${t.desc}</div>
                </div>
            </div>`;
        }
        document.getElementById('towerShop').innerHTML = html;
    }

    function renderLevelSelect() {
        let html = '';
        for (let i = 0; i < LEVELS.length; i++) {
            let level = LEVELS[i];
            let locked = false;
            if (level.hidden) {
                locked = !game.hiddenUnlocked[i];
            } else {
                locked = i >= game.unlockedLevels;
            }
            let stars = game.levelStars[i];
            let starStr = stars ? (stars.goldenCarrot ? '🏆' : '⭐') + stars.stars : (locked ? '🔒' : '');
            let bgStyle = (stars && stars.goldenCarrot) ? 'border-color:#ffd700;background:rgba(255,215,0,0.25);' : '';
            if (locked && level.hidden) bgStyle = 'border-color:rgba(224,64,251,0.4);background:rgba(224,64,251,0.1);';

            let displayNum = level.hidden ? (locked ? level.unlockIcon || '🔒' : level.name.split(' ')[0]) : (i + 1);
            html += `<div class="level-btn ${locked ? 'locked' : ''}" style="${bgStyle}font-size:${level.hidden ? '16' : '22'}px;"
                onclick="${locked ? `showLockTip(${i})` : `startLevel(${i})`}" title="${level.name}">
                ${displayNum}<br><span style="font-size:9px;">${locked ? '锁定' : (starStr || level.name.substring(0,2))}</span>
            </div>`;
        }
        document.getElementById('levelSelect').innerHTML = html;

        // 显示解锁进度
        renderUnlockProgress();
    }

    function renderUnlockProgress() {
        let el = document.getElementById('unlockProgress');
        if (!el) return;
        let html = '';
        // 检查每个隐藏关的解锁进度
        for (let i = 0; i < LEVELS.length; i++) {
            let level = LEVELS[i];
            if (!level.hidden || game.hiddenUnlocked[i]) continue;
            let progress = getUnlockProgress(i);
            html += `<div style="background:rgba(255,255,255,0.05);border:1px solid rgba(224,64,251,0.3);border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:12px;">
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
                    <span>${level.unlockIcon || '🔒'}</span>
                    <span style="color:#e040fb;font-weight:bold;">${level.name}</span>
                    <span style="color:#666;font-size:11px;">${level.unlockDesc}</span>
                </div>
                <div style="height:5px;background:rgba(255,255,255,0.1);border-radius:3px;">
                    <div style="height:5px;background:linear-gradient(90deg,#e040fb,#7c4dff);border-radius:3px;width:${progress.pct}%;transition:width 0.5s;"></div>
                </div>
                <div style="color:#aaa;font-size:10px;margin-top:3px;">${progress.text}</div>
            </div>`;
        }
        el.innerHTML = html;
    }

    function getUnlockProgress(levelIdx) {
        let level = LEVELS[levelIdx];
        if (!level.unlockReq) return { pct: 0, text: '?' };
        if (level.unlockReq === 'eggHatch') {
            let pct = Math.min(100, game.hatchedCount / 1 * 100);
            return { pct, text: `已孵化 ${game.hatchedCount}/1 只怪物` };
        }
        if (level.unlockReq === 'perfect2') {
            let count = Object.values(game.levelStars).filter(s => s.goldenCarrot && s.obstaclesCleared).length;
            return { pct: Math.min(100, count / 2 * 100), text: `完美通关 ${count}/2 关（金西瓜+道具全清）` };
        }
        if (level.unlockReq === 'collect10monsters') {
            let totalEggs = game.eggs.length + game.hatchedCount;
            return { pct: Math.min(100, totalEggs / 10 * 100), text: `已收集 ${totalEggs}/10 怪物蛋` };
        }
        return { pct: 0, text: '未知条件' };
    }

    function showLockTip(levelIdx) {
        let level = LEVELS[levelIdx];
        if (!level) return;
        let progress = getUnlockProgress(levelIdx);
        // 显示小提示
        let popup = document.getElementById('newUnlockPopup');
        document.getElementById('newUnlockText').innerHTML = `
            <div style="color:#e040fb;font-size:15px;margin-bottom:8px;">${level.name}</div>
            <div style="color:#ddd;">${level.unlockDesc}</div>
            <div style="margin-top:8px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;">
                <div style="height:6px;background:linear-gradient(90deg,#e040fb,#7c4dff);border-radius:3px;width:${progress.pct}%;"></div>
            </div>
            <div style="color:#888;font-size:11px;margin-top:4px;">${progress.text}</div>`;
        popup.style.display = 'flex';
        popup.classList.remove('hidden');
    }

    // ============ 游戏操作 ============
    function showStart() {
        document.getElementById('startScreen').classList.remove('hidden');
        document.getElementById('gameOverScreen').classList.add('hidden');
        document.getElementById('winScreen').classList.add('hidden');
        game.running = false;
        renderLevelSelect();
    }

    function startLevel(idx) {
        document.getElementById('startScreen').classList.add('hidden');
        initLevel(idx);
    }

    function nextLevel() {
        document.getElementById('winScreen').classList.add('hidden');
        if (game.currentLevel + 1 < LEVELS.length) {
            initLevel(game.currentLevel + 1);
        } else {
            showStart();
        }
    }

    function selectTowerType(type) {
        if (game.gold < TOWER_TYPES[type].cost) return;
        game.selectedType = game.selectedType === type ? null : type;
        game.selectedTower = null;
        document.querySelectorAll('.tower-btn').forEach(btn => {
            btn.classList.toggle('selected', btn.dataset.type === game.selectedType);
        });
        updateUI();
    }

    function placeTower(gx, gy) {
        if (game.grid[gx][gy] !== 0) return;
        if (!game.selectedType) return;
        let type = TOWER_TYPES[game.selectedType];
        if (game.gold < type.cost) return;

        game.gold -= type.cost;
        game.towers.push({
            type: game.selectedType,
            x: gx * TILE + TILE / 2,
            y: gy * TILE + TILE / 2,
            gx: gx, gy: gy,
            level: 0,
            lastFire: 0,
            angle: 0,
            totalCost: type.cost
        });
        game.grid[gx][gy] = 2; // tower
        game.towerTypesUsed[game.selectedType] = true;
        updateUI();
    }

    function upgradeTower() {
        if (!game.selectedTower) return;
        let t = game.selectedTower;
        let type = TOWER_TYPES[t.type];
        if (t.level >= type.levels.length - 1) return;
        let cost = type.levels[t.level + 1].upgradeCost;
        if (game.gold < cost) return;
        game.gold -= cost;
        t.level++;
        t.totalCost += cost;
        updateUI();
    }

    function sellTower() {
        if (!game.selectedTower) return;
        let t = game.selectedTower;
        let refund = Math.floor(t.totalCost * 0.6);
        game.gold += refund;
        game.grid[t.gx][t.gy] = 0;
        game.towers = game.towers.filter(tw => tw !== t);
        game.selectedTower = null;
        addFloatingText(`+${refund}💰`, t.x, t.y, '#ffd700');
        updateUI();
    }

    function startWave() {
        if (game.waveActive || game.paused) return;
        let level = LEVELS[game.currentLevel];
        if (game.currentWave >= level.waves.length) return;
        game.waveActive = true;
        spawnWave(game.currentWave);
        game.currentWave++;
        updateUI();
    }

    function togglePause() {
        if (!game.running) return;
        game.paused = !game.paused;
        let pauseBtn = document.getElementById('pauseBtn');
        let pauseHint = document.getElementById('pauseHint');
        if (game.paused) {
            pauseBtn.textContent = '▶ 继续';
            pauseBtn.classList.add('paused-active');
            if (pauseHint) pauseHint.classList.add('visible');
        } else {
            pauseBtn.textContent = '⏸ 暂停';
            pauseBtn.classList.remove('paused-active');
            if (pauseHint) pauseHint.classList.remove('visible');
        }
    }

    function toggleSpeed() {
        game.speed = game.speed === 1 ? 2 : game.speed === 2 ? 3 : 1;
        document.getElementById('speedBtn').textContent = game.speed + 'x';
    }

    // ============ 怪物生成 ============
    function spawnWave(waveIdx) {
        let level = LEVELS[game.currentLevel];
        let wave = level.waves[waveIdx];
        let delay = 0;
        wave.monsters.forEach(group => {
            for (let i = 0; i < group.count; i++) {
                setTimeout(() => {
                    if (!game.running) return;
                    spawnMonster(group.type);
                }, delay);
                delay += group.interval;
            }
        });
    }

    function spawnMonster(type) {
        let mt = MONSTER_TYPES[type];
        let level = LEVELS[game.currentLevel];
        game.monsters.push({
            type: type,
            x: level.path[0][0] * TILE + TILE / 2,
            y: level.path[0][1] * TILE + TILE / 2,
            hp: mt.hp, maxHp: mt.hp,
            speed: mt.speed,
            pathIndex: 0,
            pathProgress: 0,
            reward: mt.reward,
            color: mt.color,
            size: mt.size,
            slow: 0, slowTimer: 0,
            alive: true
        });
    }

    // ============ 子弹 ============
    function fireBullet(tower, target) {
        let type = TOWER_TYPES[tower.type];
        let lv = type.levels[tower.level];
        game.bullets.push({
            x: tower.x, y: tower.y,
            target: target,
            damage: lv.damage,
            speed: type.bulletSpeed,
            color: type.bulletColor,
            splash: lv.splash || 0,
            slow: lv.slow || 0,
            type: tower.type
        });
    }

    // ============ 特效 ============
    function addEffect(x, y, radius, color) {
        game.effects.push({ x, y, radius, maxRadius: radius, color, life: 1 });
    }

    function addFloatingText(text, x, y, color) {
        game.floatingTexts.push({ text, x, y, color, life: 1, vy: -2 });
    }

    function addParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
            let angle = Math.random() * Math.PI * 2;
            let speed = 1 + Math.random() * 3;
            game.particles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 0.5 + Math.random() * 0.5,
                color, size: 2 + Math.random() * 3
            });
        }
    }

    // ============ 游戏更新 ============
    function update() {
        if (!game.running || game.paused) return;

        game.carrotAnim += 0.03;

        // Update monsters
        for (let m of game.monsters) {
            if (!m.alive) continue;

            // Slow effect
            if (m.slowTimer > 0) {
                m.slowTimer -= 16;
                if (m.slowTimer <= 0) m.slow = 0;
            }

            let speedMult = 1 - m.slow;
            let moveSpeed = m.speed * speedMult * game.speed;

            // Move along path
            let level = LEVELS[game.currentLevel];
            if (m.pathIndex < level.path.length - 1) {
                let [x1, y1] = level.path[m.pathIndex];
                let [x2, y2] = level.path[m.pathIndex + 1];
                let sx = x1 * TILE + TILE / 2;
                let sy = y1 * TILE + TILE / 2;
                let ex = x2 * TILE + TILE / 2;
                let ey = y2 * TILE + TILE / 2;
                let d = dist(sx, sy, ex, ey);

                m.pathProgress += moveSpeed / d * TILE * 0.05;

                if (m.pathProgress >= 1) {
                    m.pathProgress = 0;
                    m.pathIndex++;
                    if (m.pathIndex >= level.path.length - 1) {
                        // Reached watermelon
                        m.alive = false;
                        game.eatingAnim = true;
                        game.eatingTimer = 50;
                        game.eatingMonster = { color: m.color, size: m.size };
                        game.lives--;
                        game.carrotHp--;
                        game.damageTaken++;  // 记录受伤次数
                        addParticles(game.carrotPos.x, game.carrotPos.y, '#ff5252', 8);
                        addFloatingText('-1 ❤️', game.carrotPos.x, game.carrotPos.y - 20, '#ff5252');
                        if (game.lives <= 0) {
                            gameOver();
                            return;
                        }
                    }
                } else {
                    m.x = lerp(sx, ex, m.pathProgress);
                    m.y = lerp(sy, ey, m.pathProgress);
                }
            }
        }

        // Tower firing
        let now = Date.now();
        for (let t of game.towers) {
            let type = TOWER_TYPES[t.type];
            let lv = type.levels[t.level];
            let target = null;
            let minDist = Infinity;

            for (let m of game.monsters) {
                if (!m.alive) continue;
                let d = dist(t.x, t.y, m.x, m.y);
                if (d <= lv.range && d < minDist) {
                    // Prefer monsters further along the path
                    if (!target || m.pathIndex > target.pathIndex || (m.pathIndex === target.pathIndex && m.pathProgress > target.pathProgress)) {
                        target = m;
                        minDist = d;
                    }
                }
            }

            if (target) {
                t.angle = Math.atan2(target.y - t.y, target.x - t.x);
                if (now - t.lastFire >= lv.fireRate / game.speed) {
                    t.lastFire = now;
                    fireBullet(t, target);
                }
            }
        }

        // Update bullets
        for (let b of game.bullets) {
            if (!b.target || !b.target.alive) {
                b.dead = true;
                continue;
            }
            let dx = b.target.x - b.x;
            let dy = b.target.y - b.y;
            let d = dist(b.x, b.y, b.target.x, b.target.y);
            if (d < b.speed * 2) {
                // Hit
                b.target.hp -= b.damage;
                b.dead = true;
                addParticles(b.x, b.y, b.color, 5);

                if (b.slow > 0 && b.target.alive) {
                    b.target.slow = b.slow;
                    b.target.slowTimer = 2000;
                }

                if (b.splash > 0) {
                    addEffect(b.x, b.y, b.splash, b.color);
                    for (let m of game.monsters) {
                        if (m === b.target || !m.alive) continue;
                        if (dist(b.x, b.y, m.x, m.y) < b.splash) {
                            m.hp -= b.damage * 0.5;
                            if (b.slow > 0) {
                                m.slow = b.slow;
                                m.slowTimer = 1500;
                            }
                        }
                    }
                }

        if (b.target.hp <= 0 && b.target.alive) {
                    b.target.alive = false;
                    game.gold += b.target.reward;
                    game.score += b.target.reward;
                    addFloatingText(`+${b.target.reward}💰`, b.target.x, b.target.y, '#ffd700');
                    addParticles(b.target.x, b.target.y, b.target.color, 10);

                    // Boss死亡 → 激活机关
                    if (b.target.type === 'boss') {
                        game.bossKillCount = (game.bossKillCount || 0) + 1;
                        let level = LEVELS[game.currentLevel];
                        if (level.mapTrigger && level.mapTrigger.requireBossKill && game.currentWave >= level.waves.length) {
                            game.secretPortalActive = true;
                        }
                    }
                }
            } else {
                b.x += (dx / d) * b.speed * game.speed * 2;
                b.y += (dy / d) * b.speed * game.speed * 2;
            }
        }

        // Update effects
        for (let e of game.effects) {
            e.life -= 0.05;
        }

        // Update particles
        for (let p of game.particles) {
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02;
            p.vx *= 0.96;
            p.vy *= 0.96;
        }

        // Update floating texts
        for (let ft of game.floatingTexts) {
            ft.y += ft.vy;
            ft.life -= 0.02;
        }

        // Cleanup
        game.monsters = game.monsters.filter(m => m.alive);
        game.bullets = game.bullets.filter(b => !b.dead);
        game.effects = game.effects.filter(e => e.life > 0);
        game.particles = game.particles.filter(p => p.life > 0);
        game.floatingTexts = game.floatingTexts.filter(ft => ft.life > 0);

        // Check wave complete
        if (game.waveActive && game.monsters.length === 0) {
            // Check if all monsters from wave have spawned
            let level = LEVELS[game.currentLevel];
            if (game.currentWave >= level.waves.length) {
                // All waves complete
                winGame();
                return;
            }
            game.waveActive = false;
        }

        updateUI();
    }

    function gameOver() {
        game.running = false;
        game.paused = false;
        document.getElementById('overScore').textContent = `得分：${game.score}`;
        document.getElementById('gameOverScreen').classList.remove('hidden');
    }

    function winGame() {
        game.running = false;
        game.paused = false;
        let level = LEVELS[game.currentLevel];

        // 评价计算
        let goldenCarrot = game.damageTaken === 0;
        let obstaclesCleared = game.totalObstacles > 0 && game.clearedObstacles >= game.totalObstacles;
        let stars = 1;
        if (game.damageTaken <= 3) stars = 2;
        if (goldenCarrot) stars = 3;

        // 检查隐藏任务
        let hiddenTaskDone = false;
        if (level.hiddenTask) {
            let ht = level.hiddenTask;
            if (ht.type === 'towerOnly' && Object.keys(game.towerTypesUsed).length === 1 && game.towerTypesUsed[ht.towerType]) hiddenTaskDone = true;
            if (ht.type === 'timeLimit' && (Date.now() - game.levelStartTime) / 1000 <= ht.seconds) hiddenTaskDone = true;
            if (ht.type === 'minTowers' && game.towers.length >= ht.minCount) hiddenTaskDone = true;
            if (ht.type === 'maxStars' && game.damageTaken === 0) hiddenTaskDone = true;
            if (ht.type === 'noUpgrade' && !Object.values(game.towers).some(t => t.level > 0)) hiddenTaskDone = true;
        }

        // 保存星级
        let prev = game.levelStars[game.currentLevel] || {};
        game.levelStars[game.currentLevel] = {
            stars: Math.max(stars, prev.stars || 0),
            goldenCarrot: goldenCarrot || (prev.goldenCarrot || false),
            obstaclesCleared: obstaclesCleared || (prev.obstaclesCleared || false)
        };

        // 解锁下一关（只对非隐藏关）
        if (!level.hidden && game.currentLevel + 1 >= game.unlockedLevels) {
            // 前5关 + 3个田园关 = 共10关
            game.unlockedLevels = Math.min(LEVELS.length, game.currentLevel + 2);
        }

        // 奖励道具 & 蛋
        let rewards = level.rewards || {};
        let eggsGained = 0;
        if (goldenCarrot && obstaclesCleared) {
            eggsGained = (rewards.eggs || 0) + 1;
        } else {
            eggsGained = rewards.eggs || 0;
        }
        for (let i = 0; i < eggsGained; i++) {
            let eggType = Math.floor(Math.random() * EGG_TYPES.length);
            game.eggs.push({ typeIdx: eggType, state: 'egg', progress: 0, feedProgress: 0 });
        }
        game.feedItems.milk = (game.feedItems.milk || 0) + (rewards.milk || 0);
        game.feedItems.cookie = (game.feedItems.cookie || 0) + (rewards.cookie || 0);

        // 检查隐藏关解锁条件
        checkHiddenUnlocks();

        // 保存数据
        saveSaveData();

        // 构建评价UI
        let ratingHtml = '';
        ratingHtml += `<div style="font-size:28px;margin:5px 0;letter-spacing:2px;">${'⭐'.repeat(stars)}${'☆'.repeat(3 - stars)}</div>`;
        if (goldenCarrot) ratingHtml += `<div style="color:#ffd700;font-weight:bold;font-size:15px;margin:3px 0;">🏆 金西瓜！全程零伤害</div>`;
        if (obstaclesCleared) ratingHtml += `<div style="color:#4caf50;font-size:14px;margin:3px 0;">✅ 道具全清</div>`;
        if (goldenCarrot && obstaclesCleared) ratingHtml += `<div style="color:#e040fb;font-size:13px;margin:3px 0;">✨ 完美通关！</div>`;
        if (hiddenTaskDone) ratingHtml += `<div style="color:#ff9800;font-weight:bold;font-size:14px;margin:3px 0;">🎯 隐藏任务完成！</div>`;

        // 下一步解锁提示
        let nextHintHtml = '';
        let nextUnlock = getNextUnlockHint();
        if (nextUnlock) {
            nextHintHtml = `<div style="background:rgba(224,64,251,0.08);border:1px solid rgba(224,64,251,0.3);border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;text-align:left;">
                <div style="color:#e040fb;font-weight:bold;margin-bottom:3px;">🔑 下一个解锁目标</div>
                <div style="color:#ccc;">${nextUnlock.name}：${nextUnlock.hint}</div>
                <div style="margin-top:4px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;">
                    <div style="height:4px;background:linear-gradient(90deg,#e040fb,#7c4dff);border-radius:2px;width:${nextUnlock.pct}%;"></div>
                </div>
            </div>`;
        }

        let rewardHtml = `<div style="background:rgba(255,255,255,0.05);border-radius:8px;padding:10px;font-size:13px;color:#ddd;margin-bottom:10px;">
            <div style="color:#ffd700;font-weight:bold;margin-bottom:6px;">🎁 本关奖励</div>
            ${eggsGained > 0 ? `<div>🥚 怪物蛋 x${eggsGained}</div>` : ''}
            ${rewards.milk ? `<div>🥛 牛奶 x${rewards.milk}</div>` : ''}
            ${rewards.cookie ? `<div>🍪 饼干 x${rewards.cookie}</div>` : ''}
            ${!eggsGained && !rewards.milk && !rewards.cookie ? '<div style="color:#666;">无奖励</div>' : ''}
        </div>`;

        document.getElementById('winScore').textContent = `得分：${game.score}`;
        document.getElementById('winRating').innerHTML = ratingHtml;
        document.getElementById('winRewards').innerHTML = nextHintHtml + rewardHtml;
        document.getElementById('winScreen').classList.remove('hidden');

        // 检查地图机关是否激活
        if (level.mapTrigger && !level.mapTrigger.requireBossKill) {
            game.secretPortalActive = true;
        }
    }

    function getNextUnlockHint() {
        // 找第一个还没解锁的隐藏关
        for (let i = 0; i < LEVELS.length; i++) {
            let level = LEVELS[i];
            if (!level.hidden || game.hiddenUnlocked[i]) continue;
            let progress = getUnlockProgress(i);
            return { name: level.name, hint: level.unlockDesc, pct: progress.pct };
        }
        return null;
    }

    function checkHiddenUnlocks() {
        let newlyUnlocked = [];

        // 关卡5（果园迷阵，索引5）- 需要孵化1只怪物
        if (game.hatchedCount >= 1 && !game.hiddenUnlocked[5]) {
            game.hiddenUnlocked[5] = true;
            newlyUnlocked.push({ name: '🍎 果园迷阵', idx: 5, reason: '孵化了第一只怪物！' });
        }
        // 关卡6（深海秘境，索引6）- 需要任意2关金西瓜+障碍全清
        let perfectCount = Object.values(game.levelStars).filter(s => s.goldenCarrot && s.obstaclesCleared).length;
        if (perfectCount >= 2 && !game.hiddenUnlocked[6]) {
            game.hiddenUnlocked[6] = true;
            newlyUnlocked.push({ name: '🌊 深海秘境', idx: 6, reason: '获得了2关金西瓜完美评价！' });

        // 关卡7（挑战竞技场，索引7）- 收集10蛋

            newlyUnlocked.push({ name: '⚔️ 挑战竞技场', idx: 7, reason: '收集了10个怪物蛋！' });

        if (newlyUnlocked.length > 0) {

                document.getElementById('newUnlockText').innerHTML = `

    }
