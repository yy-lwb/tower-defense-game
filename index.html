    function feedEgg(idx, foodType) {
        let egg = game.eggs[idx];
        if (!egg) return;
        if (foodType === 'milk' && egg.state === 'egg' && game.feedItems.milk > 0) {
            game.feedItems.milk--;
            egg.progress++;
            let et = EGG_TYPES[egg.typeIdx];
            if (egg.progress >= et.hatchTime) {
                egg.state = 'hatching';
                egg.feedProgress = 0;
                egg.feedNeed = et.feedNeed;
            }
        } else if (foodType === 'cookie' && egg.state === 'hatching' && game.feedItems.cookie > 0) {
            game.feedItems.cookie--;
            egg.feedProgress++;
            if (egg.feedProgress >= egg.feedNeed) {
                egg.state = 'hatched';
                game.hatchedCount++;
                checkHiddenUnlocks();
            }
        }
        saveSaveData();
        renderNest();
    }

    // ============ 渲染 ============
    function draw() {
        let level = LEVELS[game.currentLevel] || LEVELS[0];

        // Background
        ctx.fillStyle = level.bg;
        ctx.fillRect(0, 0, 800, 600);

        // Grid pattern
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        for (let x = 0; x <= COLS; x++) {
            ctx.beginPath(); ctx.moveTo(x * TILE, 0); ctx.lineTo(x * TILE, 600); ctx.stroke();
        }
        for (let y = 0; y <= ROWS; y++) {
            ctx.beginPath(); ctx.moveTo(0, y * TILE); ctx.lineTo(800, y * TILE); ctx.stroke();
        }

        // Draw path
        ctx.strokeStyle = level.pathColor;
        ctx.lineWidth = TILE - 4;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        for (let i = 0; i < level.path.length - 1; i++) {
            let [x1, y1] = level.path[i];
            let [x2, y2] = level.path[i + 1];
            let sx = x1 * TILE + TILE / 2;
            let sy = y1 * TILE + TILE / 2;
            let ex = x2 * TILE + TILE / 2;
            let ey = y2 * TILE + TILE / 2;
            if (i === 0) ctx.moveTo(sx, sy);
            else ctx.lineTo(sx, sy);
            ctx.lineTo(ex, ey);
        }
        ctx.stroke();

        // Path border
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = TILE;
        ctx.stroke();

        // Path fill on top
        ctx.strokeStyle = level.pathColor;
        ctx.lineWidth = TILE - 6;
        ctx.stroke();

        // Grid highlight for placement
        if (game.selectedType) {
            let rect = canvas.getBoundingClientRect();
            let mx = (mouseX - rect.left) * (800 / rect.width);
            let my = (mouseY - rect.top) * (600 / rect.height);
            let gx = Math.floor(mx / TILE);
            let gy = Math.floor(my / TILE);
            if (gx >= 0 && gx < COLS && gy >= 0 && gy < ROWS && game.grid[gx][gy] === 0) {
                ctx.fillStyle = 'rgba(255,215,0,0.3)';
                ctx.fillRect(gx * TILE, gy * TILE, TILE, TILE);
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 2;
                ctx.strokeRect(gx * TILE + 1, gy * TILE + 1, TILE - 2, TILE - 2);

                // Range preview
                let type = TOWER_TYPES[game.selectedType];
                ctx.beginPath();
                ctx.arc(gx * TILE + TILE/2, gy * TILE + TILE/2, type.levels[0].range, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255,215,0,0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.fillStyle = 'rgba(255,215,0,0.05)';
                ctx.fill();
            }
        }

        // Selected tower range
        if (game.selectedTower) {
            let t = game.selectedTower;
            let lv = TOWER_TYPES[t.type].levels[t.level];
            ctx.beginPath();
            ctx.arc(t.x, t.y, lv.range, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fill();

            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(t.gx * TILE, t.gy * TILE, TILE, TILE);
        }

        // Draw watermelon
        let cx = game.carrotPos.x;
        let cy = game.carrotPos.y + Math.sin(game.carrotAnim) * 3;
        ctx.save();
        ctx.translate(cx, cy);

        // Draw watermelon safe zone background - pulsing glow
        let glowPulse = Math.sin(game.carrotAnim * 1.5) * 0.3 + 0.7;
        let gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 40);
        gradient.addColorStop(0, `rgba(100,220,100,${0.15 * glowPulse})`);
        gradient.addColorStop(0.6, `rgba(50,180,50,${0.08 * glowPulse})`);
        gradient.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(0, 0, 40, 0, Math.PI * 2);
        ctx.fill();

        // Safe zone dashed ring
        ctx.strokeStyle = `rgba(100,220,100,${0.3 * glowPulse})`;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.arc(0, 0, 38, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);

        // Eating animation - watermelon shakes and monster bites
        let shakeX = 0, shakeY = 0;
        let eatAlpha = 0;
        if (game.eatingAnim) {
            game.eatingTimer--;
            shakeX = (Math.random() - 0.5) * 8;
            shakeY = (Math.random() - 0.5) * 8;
            ctx.translate(shakeX, shakeY);
            eatAlpha = Math.min(1, game.eatingTimer / 15);

            if (game.eatingTimer <= 0) {
                game.eatingAnim = false;
                game.eatingMonster = null;
            }
        }

        // Watermelon body - outer green skin with gradient
        let wGrad = ctx.createRadialGradient(-4, -5, 2, 0, 0, 22);
        wGrad.addColorStop(0, '#5cb85c');
        wGrad.addColorStop(0.5, '#2e7d32');
        wGrad.addColorStop(1, '#1b5e20');
        ctx.fillStyle = wGrad;
        ctx.beginPath();
        ctx.arc(0, 0, 22, 0, Math.PI * 2);
        ctx.fill();

        // Dark green stripes
        ctx.strokeStyle = '#1b5e20';
        ctx.lineWidth = 3;
        ctx.globalAlpha = 0.6;
        for (let i = -2; i <= 2; i++) {
            ctx.beginPath();
            ctx.arc(i * 9, 0, 22, -0.55, 0.55);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;

        // Inner red flesh (semi-circle bottom half peek)
        ctx.save();
        ctx.beginPath();
        ctx.arc(0, 0, 22, 0, Math.PI * 2);
        ctx.clip();
        let rGrad = ctx.createRadialGradient(0, 4, 0, 0, 4, 18);
        rGrad.addColorStop(0, '#ff6b6b');
        rGrad.addColorStop(0.7, '#e53935');
        rGrad.addColorStop(1, '#c62828');
        ctx.fillStyle = rGrad;
        ctx.beginPath();
        ctx.ellipse(0, 6, 17, 14, 0, 0, Math.PI * 2);
        ctx.fill();

        // Seeds on red flesh
        ctx.fillStyle = '#1a1a1a';
        const seedPositions = [[-6, 5], [6, 5], [0, 10], [-10, 9], [10, 9], [-3, 14], [3, 14]];
        for (let [sx, sy] of seedPositions) {
            ctx.save();
            ctx.translate(sx, sy);
            ctx.rotate(Math.atan2(sy, sx) + Math.PI/2);
            ctx.beginPath();
            ctx.ellipse(0, 0, 1.5, 3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
        ctx.restore();

        // Watermelon highlight
        ctx.fillStyle = 'rgba(255,255,255,0.22)';
        ctx.beginPath();
        ctx.ellipse(-6, -8, 9, 5.5, -0.5, 0, Math.PI * 2);
        ctx.fill();

        // Small leaf/stem on top
        ctx.save();
        ctx.translate(0, -21);
        // stem
        ctx.strokeStyle = '#33691e';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(0, -6);
        ctx.stroke();
        // leaf
        ctx.fillStyle = '#558b2f';
        ctx.beginPath();
        ctx.ellipse(4, -4, 6, 3, 0.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#689f38';
        ctx.beginPath();
        ctx.ellipse(-4, -5, 5, 2.5, -0.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Cute face - on top of green skin
        // Eyes (bigger, cuter)
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.ellipse(-6, -5, 4, 4.5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(6, -5, 4, 4.5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#222';
        ctx.beginPath(); ctx.arc(-5.5, -5, 2.8, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(6.5, -5, 2.8, 0, Math.PI * 2); ctx.fill();
        // Eye highlights
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(-4.5, -6.5, 1.2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(7.5, -6.5, 1.2, 0, Math.PI * 2); ctx.fill();
        // Star sparkle in eye
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.beginPath(); ctx.arc(-4, -4, 0.7, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(8, -4, 0.7, 0, Math.PI * 2); ctx.fill();
        // Blush
        ctx.fillStyle = 'rgba(255,120,120,0.45)';
        ctx.beginPath(); ctx.ellipse(-11, 0, 5, 3, 0.2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(11, 0, 5, 3, -0.2, 0, Math.PI * 2); ctx.fill();
        // Smile
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.arc(0, -2, 7, 0.25, Math.PI - 0.25);
        ctx.stroke();

        // Eating damage indicator - bite marks
        if (game.carrotHp < game.maxCarrotHp) {
            let damagePct = 1 - (game.carrotHp / game.maxCarrotHp);
            ctx.fillStyle = '#ff5252';
            ctx.globalAlpha = damagePct * 0.9;
            let biteSize = 6 + damagePct * 11;
            // Multiple bite marks
            ctx.beginPath();
            ctx.arc(14, 7, biteSize, 0, Math.PI * 2);
            ctx.fill();
            if (damagePct > 0.3) {
                ctx.beginPath();
                ctx.arc(-12, 9, biteSize * 0.65, 0, Math.PI * 2);
                ctx.fill();
            }
            if (damagePct > 0.6) {
                ctx.beginPath();
                ctx.arc(6, -16, biteSize * 0.55, 0, Math.PI * 2);
                ctx.fill();
            }
            // Red flesh exposed
            ctx.fillStyle = '#e53935';
            ctx.beginPath();
            ctx.arc(14, 7, biteSize * 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;

            // Sad face when hurt - cover smile with frown
            if (damagePct > 0.25) {
                // Frown
                ctx.strokeStyle = '#222';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.arc(0, 8, 7, Math.PI + 0.25, -0.25);
                ctx.stroke();
                // Tear drops
                ctx.fillStyle = '#64b5f6';
                ctx.globalAlpha = Math.min(1, damagePct * 1.5);
                ctx.beginPath();
                ctx.ellipse(-8, 2, 2, 4, 0.15, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(8, 2, 2, 4, -0.15, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                // X eyes when very hurt
                if (damagePct > 0.65) {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2.5;
                    ctx.lineCap = 'round';
                    [[-7,-7],[-4,-3]].forEach(([x1,y1]) => {
                        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x1+3, y1+4); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(x1+3,y1); ctx.lineTo(x1, y1+4); ctx.stroke();
                    });
                    [[5,-7],[8,-3]].forEach(([x1,y1]) => {
                        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x1+3, y1+4); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(x1+3,y1); ctx.lineTo(x1, y1+4); ctx.stroke();
                    });
                }
            }
        }

        // Eating animation - monster chomping overlay
        if (game.eatingAnim && game.eatingMonster) {
            let em = game.eatingMonster;
            let chompPhase = Math.sin(game.eatingTimer * 0.4);
            // Monster body approaching from right
            let monsterX = 22 - eatAlpha * 4;
            ctx.fillStyle = em.color;
            ctx.globalAlpha = eatAlpha;
            ctx.beginPath();
            ctx.arc(monsterX, 2, em.size * 0.9, 0, Math.PI * 2);
            ctx.fill();
            // Monster eyes (angry)
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(monsterX - 3, -2, 3, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#333';
            ctx.beginPath(); ctx.arc(monsterX - 2, -2, 1.5, 0, Math.PI * 2); ctx.fill();
            // Teeth (chomping)
            ctx.fillStyle = '#fff';
            let teethOpen = Math.abs(chompPhase) * 3;
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                let tx = monsterX - 10 + i * 5;
                ctx.moveTo(tx, 8 + teethOpen);
                ctx.lineTo(tx + 2, 8 + teethOpen + 4);
                ctx.lineTo(tx + 4, 8 + teethOpen);
                ctx.fill();
            }
            // Muzzle flash effect
            ctx.fillStyle = 'rgba(255,82,82,0.4)';
            ctx.beginPath();
            ctx.arc(10, 5, 8 + Math.random() * 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            // Chomp particles
            if (game.eatingTimer % 3 === 0) {
                addParticles(cx + 12, cy + 5, '#ff5252', 3);
            }
        }

        ctx.restore();

        // HP bar for watermelon (wider, better looking)
        let hpPct = game.carrotHp / game.maxCarrotHp;
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.beginPath();
        ctx.roundRect(cx - 24, cy - 38, 48, 7, 3);
        ctx.fill();
        let hpColor = hpPct > 0.5 ? '#4caf50' : hpPct > 0.25 ? '#ff9800' : '#f44336';
        let hpGrad = ctx.createLinearGradient(cx - 24, 0, cx + 24, 0);
        hpGrad.addColorStop(0, hpColor);
        hpGrad.addColorStop(1, hpColor + 'bb');
        ctx.fillStyle = hpGrad;
        ctx.beginPath();
        ctx.roundRect(cx - 24, cy - 38, 48 * hpPct, 7, 3);
        ctx.fill();

        // Draw obstacles
        for (let ob of game.obstacles) {
            if (ob.hp <= 0) continue;
            let obType = OBSTACLE_TYPES[ob.type];
            let ox = ob.x * TILE, oy = ob.y * TILE;
            // 背景
            ctx.fillStyle = obType.color + '50';
            ctx.fillRect(ox + 2, oy + 2, TILE - 4, TILE - 4);
            ctx.strokeStyle = obType.color;
            ctx.lineWidth = 2;
            ctx.strokeRect(ox + 2, oy + 2, TILE - 4, TILE - 4);
            // 图标
            ctx.font = '18px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(obType.icon, ox + TILE / 2, oy + TILE / 2 - 3);
            // 费用提示
            ctx.font = '9px Microsoft YaHei';
            ctx.fillStyle = '#ffd700';
            ctx.fillText(`💰${obType.cost}`, ox + TILE / 2, oy + TILE - 8);
            // HP条
            let hpPctOb = ob.hp / ob.maxHp;
            if (hpPctOb < 1) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(ox + 4, oy + 3, TILE - 8, 3);
                ctx.fillStyle = '#4caf50';
                ctx.fillRect(ox + 4, oy + 3, (TILE - 8) * hpPctOb, 3);
            }
        }

        // Draw secret map trigger (机关)
        let curLevel = LEVELS[game.currentLevel];
        if (curLevel && curLevel.mapTrigger) {
            let mt = curLevel.mapTrigger;
            let tx = mt.x * TILE, ty = mt.y * TILE;
            let pulse = Math.sin(Date.now() * 0.004) * 0.4 + 0.6;
            if (game.secretPortalActive) {
                // 机关激活 - 发光闪烁
                ctx.save();
                ctx.globalAlpha = pulse;
                ctx.fillStyle = 'rgba(224,64,251,0.3)';
                ctx.beginPath();
                ctx.arc(tx + TILE/2, ty + TILE/2, TILE * 0.8, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#e040fb';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.globalAlpha = 1;
                ctx.font = '22px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(mt.icon || '🌀', tx + TILE/2, ty + TILE/2);
                // 提示文字
                ctx.font = 'bold 11px Microsoft YaHei';
                ctx.fillStyle = '#e040fb';
                ctx.globalAlpha = pulse;
                ctx.fillText('点击!', tx + TILE/2, ty + TILE + 6);
                ctx.globalAlpha = 1;
                ctx.restore();
            } else {
                // 机关未激活 - 淡显
                ctx.save();
                ctx.globalAlpha = 0.25;
                ctx.font = '16px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(mt.icon || '🌀', tx + TILE/2, ty + TILE/2);
                ctx.restore();
            }
        }

        // Draw towers - 形象化绘制
        for (let t of game.towers) {
            let type = TOWER_TYPES[t.type];
            let lv = type.levels[t.level];

            ctx.save();
            ctx.translate(t.x, t.y);

            // 等级光环
            if (t.level >= 2) {
                let lvGlow = ctx.createRadialGradient(0, 0, 8, 0, 0, 20);
                lvGlow.addColorStop(0, type.color + '30');
                lvGlow.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = lvGlow;
                ctx.beginPath();
                ctx.arc(0, 0, 20, 0, Math.PI * 2);
                ctx.fill();
            }

            // 底座
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(0, 14, 14, 5, 0, 0, Math.PI * 2);
            ctx.fill();

            switch(t.type) {
                case 'bottle':
                    // 瓶子塔 - 蓝色玻璃瓶
                    ctx.fillStyle = 'rgba(79,195,247,0.3)';
                    ctx.strokeStyle = '#4fc3f7';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 16, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    // 瓶身
                    ctx.fillStyle = '#4fc3f7';
                    ctx.beginPath();
                    ctx.roundRect(-6, -6, 12, 14, 3);
                    ctx.fill();
                    // 瓶盖
                    ctx.fillStyle = '#0288d1';
                    ctx.fillRect(-4, -9, 8, 4);
                    // 水纹
                    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(-4, -2);
                    ctx.quadraticCurveTo(0, -4, 4, -2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(-4, 2);
                    ctx.quadraticCurveTo(0, 0, 4, 2);
                    ctx.stroke();
                    // 炮口
                    ctx.save();
                    ctx.rotate(t.angle);
                    ctx.fillStyle = '#0288d1';
                    ctx.fillRect(6, -2, 10, 4);
                    ctx.fillStyle = '#4fc3f7';
                    ctx.beginPath();
                    ctx.arc(16, 0, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                    break;

                case 'fan':
                    // 风扇塔 - 旋转风扇
                    ctx.fillStyle = 'rgba(129,199,132,0.3)';
                    ctx.strokeStyle = '#81c784';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 16, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    // 支架
                    ctx.fillStyle = '#5d4037';
                    ctx.fillRect(-2, -2, 4, 16);
                    // 风扇叶片（旋转动画）
                    let fAngle = Date.now() * 0.008;
                    ctx.save();
                    ctx.rotate(fAngle);
                    for (let i = 0; i < 4; i++) {
                        ctx.save();
                        ctx.rotate(i * Math.PI / 2);
                        ctx.fillStyle = i % 2 === 0 ? '#81c784' : '#66bb6a';
                        ctx.beginPath();
                        ctx.ellipse(0, -6, 3, 7, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }
                    ctx.restore();
                    // 中心轴
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(0, 0, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#81c784';
                    ctx.beginPath();
                    ctx.arc(0, 0, 2, 0, Math.PI * 2);
                    ctx.fill();
                    break;

                case 'rocket':
                    // 火箭塔 - 导弹发射架
                    ctx.fillStyle = 'rgba(239,83,80,0.3)';
                    ctx.strokeStyle = '#ef5350';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 16, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    // 发射架底座
                    ctx.fillStyle = '#546e7a';
                    ctx.fillRect(-8, 2, 16, 8);
                    ctx.fillStyle = '#455a64';
                    ctx.fillRect(-6, -4, 12, 8);
                    // 导弹管
                    ctx.save();
                    ctx.rotate(t.angle);
                    ctx.fillStyle = '#78909c';
                    ctx.fillRect(-3, -3, 18, 6);
                    // 导弹头
                    ctx.fillStyle = '#ef5350';
                    ctx.beginPath();
                    ctx.moveTo(15, -3);
                    ctx.lineTo(20, 0);
                    ctx.lineTo(15, 3);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                    // 指示灯
                    ctx.fillStyle = '#ef5350';
                    let blinkRocket = Math.sin(Date.now() * 0.01) > 0;
                    if (blinkRocket) {
                        ctx.beginPath();
                        ctx.arc(0, -6, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    break;

                case 'star':
                    // 星星塔 - 魔法星阵
                    ctx.fillStyle = 'rgba(255,215,64,0.2)';
                    ctx.strokeStyle = '#ffd740';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 16, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    // 星座阵底座
                    ctx.fillStyle = '#795548';
                    ctx.beginPath();
                    ctx.arc(0, 0, 6, 0, Math.PI * 2);
                    ctx.fill();
                    // 旋转星星
                    let sAngle = Date.now() * 0.003;
                    ctx.save();
                    ctx.rotate(sAngle);
                    ctx.fillStyle = '#ffd740';
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        let a1 = i * Math.PI * 2 / 5 - Math.PI / 2;
                        let a2 = a1 + Math.PI / 5;
                        ctx.lineTo(Math.cos(a1) * 10, Math.sin(a1) * 10);
                        ctx.lineTo(Math.cos(a2) * 4, Math.sin(a2) * 4);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                    // 中心宝石
                    ctx.fillStyle = '#fff8e1';
                    ctx.beginPath();
                    ctx.arc(0, 0, 3, 0, Math.PI * 2);
                    ctx.fill();
                    // 光芒
                    ctx.strokeStyle = 'rgba(255,215,64,0.4)';
                    ctx.lineWidth = 1;
                    for (let i = 0; i < 4; i++) {
                        ctx.save();
                        ctx.rotate(sAngle + i * Math.PI / 2);
                        ctx.beginPath();
                        ctx.moveTo(0, -12);
                        ctx.lineTo(0, -15);
                        ctx.stroke();
                        ctx.restore();
                    }
                    break;

                case 'watergun':
                    // 水枪塔 - 绿色水管+水枪
                    ctx.fillStyle = 'rgba(41,182,246,0.3)';
                    ctx.strokeStyle = '#29b6f6';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 16, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    // 水桶底座
                    ctx.fillStyle = '#0288d1';
                    ctx.beginPath();
                    ctx.roundRect(-8, 0, 16, 10, 2);
                    ctx.fill();
                    // 水桶高光
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(-6, 2, 4, 6);
                    // 水枪管
                    ctx.save();
                    ctx.rotate(t.angle);
                    ctx.fillStyle = '#01579b';
                    ctx.fillRect(0, -3, 14, 6);
                    // 枪口
                    ctx.fillStyle = '#29b6f6';
                    ctx.beginPath();
                    ctx.arc(14, 0, 4, 0, Math.PI * 2);
                    ctx.fill();
                    // 水滴
                    ctx.fillStyle = 'rgba(100,200,255,0.7)';
                    ctx.beginPath();
                    ctx.ellipse(18, 0, 3, 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                    break;

                case 'scarecrow':
                    // 稻草人 - 十字架+衣服
                    ctx.fillStyle = 'rgba(141,110,99,0.3)';
                    ctx.strokeStyle = '#8d6e63';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 16, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    // 十字架
                    ctx.strokeStyle = '#5d4037';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(0, 10); ctx.lineTo(0, -10);
                    ctx.moveTo(-8, -2); ctx.lineTo(8, -2);
                    ctx.stroke();
                    // 衣服
                    ctx.fillStyle = '#ff9800';
                    ctx.beginPath();
                    ctx.moveTo(-6, -2); ctx.lineTo(-8, 10); ctx.lineTo(8, 10); ctx.lineTo(6, -2);
                    ctx.closePath();
                    ctx.fill();
                    // 头部（布袋）
                    ctx.fillStyle = '#d7ccc8';
                    ctx.beginPath();
                    ctx.arc(0, -10, 5, 0, Math.PI * 2);
                    ctx.fill();
                    // 帽子
                    ctx.fillStyle = '#795548';
                    ctx.fillRect(-6, -16, 12, 4);
                    ctx.fillRect(-4, -20, 8, 5);
                    // 眼睛（X形）
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.moveTo(-3, -11); ctx.lineTo(-1, -9); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(-1, -11); ctx.lineTo(-3, -9); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(1, -11); ctx.lineTo(3, -9); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(3, -11); ctx.lineTo(1, -9); ctx.stroke();
                    // 惊吓光环
                    let scarePulse = Math.sin(Date.now() * 0.005) * 0.3 + 0.5;
                    ctx.strokeStyle = `rgba(255,152,0,${scarePulse})`;
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([3, 3]);
                    ctx.beginPath();
                    ctx.arc(0, 0, 18, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    break;

                case 'sling':
                    // 弹弓塔 - Y形弹弓
                    ctx.fillStyle = 'rgba(121,85,72,0.3)';
                    ctx.strokeStyle = '#795548';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 16, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    // 弹弓Y形
                    ctx.strokeStyle = '#5d4037';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(0, 10); ctx.lineTo(0, -2); ctx.lineTo(-6, -10);
                    ctx.moveTo(0, -2); ctx.lineTo(6, -10);
                    ctx.stroke();
                    // 皮筋
                    ctx.save();
                    ctx.rotate(t.angle);
                    ctx.strokeStyle = '#d32f2f';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(-6, -10);
                    ctx.lineTo(12, 0);
                    ctx.lineTo(6, -10);
                    ctx.stroke();
                    // 石子
                    ctx.fillStyle = '#9e9e9e';
                    ctx.beginPath();
                    ctx.arc(12, 0, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.beginPath();
                    ctx.arc(11, -1, 1, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                    break;

                case 'net':
                    // 捕虫网 - 网兜
                    ctx.fillStyle = 'rgba(102,187,106,0.3)';
                    ctx.strokeStyle = '#66bb6a';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 16, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    // 网柄
                    ctx.strokeStyle = '#795548';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(0, 10); ctx.lineTo(0, -4);
                    ctx.stroke();
                    // 网圈
                    ctx.save();
                    ctx.rotate(t.angle);
                    ctx.strokeStyle = '#4caf50';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(8, 0, 8, 0, Math.PI * 2);
                    ctx.stroke();
                    // 网格
                    ctx.strokeStyle = 'rgba(102,187,106,0.5)';
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(0, -8); ctx.lineTo(16, -8);
                    ctx.moveTo(0, 0); ctx.lineTo(16, 0);
                    ctx.moveTo(0, 8); ctx.lineTo(16, 8);
                    ctx.moveTo(4, -10); ctx.lineTo(4, 10);
                    ctx.moveTo(12, -10); ctx.lineTo(12, 10);
                    ctx.stroke();
                    ctx.restore();
                    break;

                case 'bomb':
                    // 西瓜炸弹 - 酷炫小西瓜
                    ctx.fillStyle = 'rgba(229,57,53,0.3)';
                    ctx.strokeStyle = '#e53935';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 16, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    // 西瓜身体
                    let melonGrad = ctx.createRadialGradient(-3, -3, 2, 0, 0, 12);
                    melonGrad.addColorStop(0, '#4caf50');
                    melonGrad.addColorStop(0.7, '#2e7d32');
                    melonGrad.addColorStop(1, '#1b5e20');
                    ctx.fillStyle = melonGrad;
                    ctx.beginPath();
                    ctx.arc(0, 0, 12, 0, Math.PI * 2);
                    ctx.fill();
                    // 条纹
                    ctx.strokeStyle = '#1b5e20';
                    ctx.lineWidth = 2;
                    ctx.globalAlpha = 0.5;
                    for (let i = -1; i <= 1; i++) {
                        ctx.beginPath();
                        ctx.arc(i * 6, 0, 12, -0.5, 0.5);
                        ctx.stroke();
                    }
                    ctx.globalAlpha = 1;
                    // 引信
                    ctx.strokeStyle = '#5d4037';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, -12);
                    ctx.quadraticCurveTo(5, -16, 4, -18);
                    ctx.stroke();
                    // 闪烁火花
                    let bSpark = Math.sin(Date.now() * 0.02) * 0.5 + 0.5;
                    ctx.fillStyle = `rgba(255,235,59,${bSpark})`;
                    ctx.beginPath();
                    ctx.arc(4, -18, 3 + bSpark, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ff5722';
                    ctx.beginPath();
                    ctx.arc(4, -18, 2, 0, Math.PI * 2);
                    ctx.fill();
                    // 红色X标记
                    ctx.strokeStyle = '#e53935';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath(); ctx.moveTo(-4, -4); ctx.lineTo(4, 4); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(4, -4); ctx.lineTo(-4, 4); ctx.stroke();
                    break;

                default:
                    // 默认塔样式
                    ctx.fillStyle = type.color + '40';
                    ctx.strokeStyle = type.color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 16, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = type.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, 12, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.save();
                    ctx.rotate(t.angle);
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(0, -2, 16, 4);
                    ctx.beginPath();
                    ctx.arc(16, 0, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                    ctx.font = '14px serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(type.icon, 0, 0);
            }

            // 等级指示器
            if (t.level > 0) {
                for (let i = 0; i <= t.level; i++) {
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.arc(-6 + i * 6, 18, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            ctx.restore();
        }

        // Draw monsters - 形象化绘制
        for (let m of game.monsters) {
            if (!m.alive) continue;

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(m.x, m.y + m.size + 2, m.size * 0.8, m.size * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.save();
            ctx.translate(m.x, m.y);

            let dt = m.drawType || 'normal';
            let wobble = Math.sin(Date.now() * 0.008 + m.x) * 0.1;

            switch(dt) {
                case 'normal':
                    // 原始小怪 - 绿色圆球
                    ctx.fillStyle = m.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, m.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    break;

                case 'fast':
                    // 飞毛腿 - 流线型蓝色
                    ctx.fillStyle = m.color;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, m.size * 1.3, m.size * 0.8, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    // 速度线
                    ctx.strokeStyle = 'rgba(66,165,245,0.5)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(-m.size * 1.3, -2);
                    ctx.lineTo(-m.size * 1.8, -2);
                    ctx.moveTo(-m.size * 1.3, 2);
                    ctx.lineTo(-m.size * 1.8, 2);
                    ctx.stroke();
                    break;

                case 'tank':
                    // 铁甲怪 - 方形装甲
                    ctx.fillStyle = m.color;
                    ctx.beginPath();
                    ctx.roundRect(-m.size, -m.size, m.size * 2, m.size * 2, 4);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    // 装甲线
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(-m.size + 3, 0); ctx.lineTo(m.size - 3, 0);
                    ctx.stroke();
                    break;

                case 'boss':
                    // Boss - 大型带角
                    ctx.fillStyle = m.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, m.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    // 角
                    ctx.fillStyle = '#b71c1c';
                    ctx.beginPath();
                    ctx.moveTo(-8, -m.size + 2);
                    ctx.lineTo(-12, -m.size - 8);
                    ctx.lineTo(-4, -m.size + 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(8, -m.size + 2);
                    ctx.lineTo(12, -m.size - 8);
                    ctx.lineTo(4, -m.size + 2);
                    ctx.fill();
                    break;

                case 'mole':
                    // 地鼠 - 棕色身体+大爪子
                    ctx.rotate(wobble);
                    // 身体
                    ctx.fillStyle = '#8d6e63';
                    ctx.beginPath();
                    ctx.ellipse(0, 2, m.size, m.size * 0.9, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#5d4037';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    // 肚皮
                    ctx.fillStyle = '#d7ccc8';
                    ctx.beginPath();
                    ctx.ellipse(0, 4, m.size * 0.6, m.size * 0.5, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 大爪子
                    ctx.fillStyle = '#6d4c41';
                    ctx.beginPath();
                    ctx.ellipse(-m.size - 2, 2, 4, 3, 0.3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(m.size + 2, 2, 4, 3, -0.3, 0, Math.PI * 2);
                    ctx.fill();
                    // 爪子趾甲
                    ctx.fillStyle = '#fff';
                    for (let ci = -1; ci <= 1; ci++) {
                        ctx.beginPath();
                        ctx.arc(-m.size - 3 + ci * 2, 0, 1, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(m.size + 1 + ci * 2, 0, 1, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    // 眼睛
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(-4, -3, 3.5, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(4, -3, 3.5, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#222';
                    ctx.beginPath(); ctx.arc(-3, -3, 2, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(5, -3, 2, 0, Math.PI * 2); ctx.fill();
                    // 鼻子
                    ctx.fillStyle = '#e91e63';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 3, 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 门牙
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(-1.5, 2, 1.5, 3);
                    ctx.fillRect(0.5, 2, 1.5, 3);
                    break;

                case 'crow':
                    // 乌鸦 - 黑色V形身体
                    ctx.rotate(Math.sin(Date.now() * 0.012) * 0.15);
                    // 身体
                    ctx.fillStyle = '#37474f';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, m.size * 1.1, m.size * 0.7, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 翅膀（扇动）
                    let wingFlap = Math.sin(Date.now() * 0.015) * 5;
                    ctx.fillStyle = '#263238';
                    ctx.beginPath();
                    ctx.moveTo(-3, -2);
                    ctx.quadraticCurveTo(-m.size, -m.size - wingFlap, -m.size + 2, 2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(3, -2);
                    ctx.quadraticCurveTo(m.size, -m.size - wingFlap, m.size - 2, 2);
                    ctx.closePath();
                    ctx.fill();
                    // 头
                    ctx.fillStyle = '#37474f';
                    ctx.beginPath();
                    ctx.arc(0, -m.size * 0.4, m.size * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                    // 黄嘴
                    ctx.fillStyle = '#ff8f00';
                    ctx.beginPath();
                    ctx.moveTo(-2, -m.size * 0.4);
                    ctx.lineTo(0, -m.size * 0.1);
                    ctx.lineTo(2, -m.size * 0.4);
                    ctx.closePath();
                    ctx.fill();
                    // 眼
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(-2, -m.size * 0.5, 2, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#222';
                    ctx.beginPath(); ctx.arc(-2, -m.size * 0.5, 1, 0, Math.PI * 2); ctx.fill();
                    break;

                case 'boar':
                    // 野猪 - 大型棕色+獠牙
                    ctx.rotate(wobble * 0.5);
                    // 身体
                    ctx.fillStyle = '#6d4c41';
                    ctx.beginPath();
                    ctx.ellipse(0, 2, m.size, m.size * 0.85, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#4e342e';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    // 鬃毛
                    ctx.fillStyle = '#3e2723';
                    ctx.beginPath();
                    ctx.moveTo(-m.size * 0.6, -m.size * 0.3);
                    for (let hi = 0; hi < 5; hi++) {
                        ctx.lineTo(-m.size * 0.5 + hi * 3, -m.size * 0.6 - Math.sin(Date.now() * 0.01 + hi) * 2);
                    }
                    ctx.lineTo(m.size * 0.6, -m.size * 0.3);
                    ctx.closePath();
                    ctx.fill();
                    // 鼻子
                    ctx.fillStyle = '#d7ccc8';
                    ctx.beginPath();
                    ctx.ellipse(0, m.size * 0.3, m.size * 0.35, m.size * 0.25, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#8d6e63';
                    ctx.beginPath(); ctx.arc(-2, m.size * 0.3, 1.5, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(2, m.size * 0.3, 1.5, 0, Math.PI * 2); ctx.fill();
                    // 獠牙
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.moveTo(-5, m.size * 0.1);
                    ctx.lineTo(-7, m.size * 0.5);
                    ctx.lineTo(-3, m.size * 0.2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(5, m.size * 0.1);
                    ctx.lineTo(7, m.size * 0.5);
                    ctx.lineTo(3, m.size * 0.2);
                    ctx.fill();
                    // 眼睛（凶狠的）
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(-5, -4, 3, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(5, -4, 3, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#b71c1c';
                    ctx.beginPath(); ctx.arc(-4, -4, 2, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(6, -4, 2, 0, Math.PI * 2); ctx.fill();
                    break;

                case 'ant':
                    // 蚂蚁 - 三节身体
                    ctx.rotate(Math.sin(Date.now() * 0.02) * 0.2);
                    // 头
                    ctx.fillStyle = '#c62828';
                    ctx.beginPath();
                    ctx.arc(0, -m.size * 0.6, m.size * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                    // 胸
                    ctx.fillStyle = '#d32f2f';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, m.size * 0.4, m.size * 0.5, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 腹
                    ctx.fillStyle = '#b71c1c';
                    ctx.beginPath();
                    ctx.ellipse(0, m.size * 0.8, m.size * 0.55, m.size * 0.6, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 触角
                    ctx.strokeStyle = '#4e342e';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(-1, -m.size);
                    ctx.quadraticCurveTo(-4, -m.size - 4, -6, -m.size - 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(1, -m.size);
                    ctx.quadraticCurveTo(4, -m.size - 4, 6, -m.size - 2);
                    ctx.stroke();
                    // 腿
                    ctx.strokeStyle = '#4e342e';
                    ctx.lineWidth = 1;
                    for (let li = -1; li <= 1; li++) {
                        ctx.beginPath();
                        ctx.moveTo(-m.size * 0.35, li * 3);
                        ctx.lineTo(-m.size - 2, li * 5 + 1);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(m.size * 0.35, li * 3);
                        ctx.lineTo(m.size + 2, li * 5 + 1);
                        ctx.stroke();
                    }
                    // 眼
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(-2, -m.size * 0.7, 1.5, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(2, -m.size * 0.7, 1.5, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#222';
                    ctx.beginPath(); ctx.arc(-2, -m.size * 0.7, 0.8, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(2, -m.size * 0.7, 0.8, 0, Math.PI * 2); ctx.fill();
                    break;

                case 'fieldmouse':
                    // 田鼠 - 灰棕色+长尾巴
                    ctx.rotate(wobble);
                    // 身体
                    ctx.fillStyle = '#795548';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, m.size * 1.2, m.size * 0.8, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#5d4037';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    // 肚皮
                    ctx.fillStyle = '#bcaaa4';
                    ctx.beginPath();
                    ctx.ellipse(0, 2, m.size * 0.7, m.size * 0.5, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 耳朵（圆）
                    ctx.fillStyle = '#8d6e63';
                    ctx.beginPath(); ctx.arc(-5, -m.size * 0.7, 4, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(5, -m.size * 0.7, 4, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#d7ccc8';
                    ctx.beginPath(); ctx.arc(-5, -m.size * 0.7, 2.5, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(5, -m.size * 0.7, 2.5, 0, Math.PI * 2); ctx.fill();
                    // 尾巴
                    ctx.strokeStyle = '#bcaaa4';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(-m.size * 1.1, 2);
                    ctx.quadraticCurveTo(-m.size * 1.8, -2 + Math.sin(Date.now() * 0.01) * 4, -m.size * 1.6, -5);
                    ctx.stroke();
                    // 眼睛（贼溜溜的）
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(-3, -2, 2.5, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(3, -2, 2.5, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#222';
                    ctx.beginPath(); ctx.arc(-2.5, -2, 1.5, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(3.5, -2, 1.5, 0, Math.PI * 2); ctx.fill();
                    // 胡须
                    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(0, 0); ctx.lineTo(8, -3);
                    ctx.moveTo(0, 1); ctx.lineTo(8, 2);
                    ctx.moveTo(0, 2); ctx.lineTo(8, 6);
                    ctx.stroke();
                    // 鼻子
                    ctx.fillStyle = '#e91e63';
                    ctx.beginPath();
                    ctx.arc(m.size * 0.8, 0, 2, 0, Math.PI * 2);
                    ctx.fill();
                    break;

                default:
                    // 默认圆形怪物
                    ctx.fillStyle = m.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, m.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
            }

            // 减速效果
            if (m.slow > 0) {
                ctx.strokeStyle = '#4fc3f7';
                ctx.lineWidth = 2;
                ctx.setLineDash([3, 3]);
                ctx.beginPath();
                ctx.arc(0, 0, m.size + 3, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // 原始怪物的眼睛（仅 normal/fast/tank/boss）
            if (['normal', 'fast', 'tank', 'boss'].includes(dt)) {
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(-3, -2, 3, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(3, -2, 3, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#333';
                ctx.beginPath(); ctx.arc(-2, -2, 1.5, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(4, -2, 1.5, 0, Math.PI * 2); ctx.fill();
            }

            ctx.restore();

            // HP bar
            if (m.hp < m.maxHp) {
                let w = m.size * 2;
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(m.x - w/2, m.y - m.size - 8, w, 4);
                ctx.fillStyle = m.hp / m.maxHp > 0.5 ? '#4caf50' : m.hp / m.maxHp > 0.25 ? '#ff9800' : '#f44336';
                ctx.fillRect(m.x - w/2, m.y - m.size - 8, w * (m.hp / m.maxHp), 4);
            }
        }

        // Draw bullets - 形象化绘制
        for (let b of game.bullets) {
            let bType = b.type || 'bottle';
            ctx.save();
            ctx.translate(b.x, b.y);
            let angle = 0;
            if (b.target && b.target.alive) {
                angle = Math.atan2(b.target.y - b.y, b.target.x - b.x);
            }
            ctx.rotate(angle);

            switch(bType) {
                case 'bottle':
                    // 水瓶 - 蓝色水滴形状
                    ctx.fillStyle = '#4fc3f7';
                    ctx.beginPath();
                    ctx.moveTo(6, 0);
                    ctx.quadraticCurveTo(4, -4, 0, -5);
                    ctx.quadraticCurveTo(-6, -2, -6, 2);
                    ctx.quadraticCurveTo(-4, 5, 0, 6);
                    ctx.quadraticCurveTo(4, 5, 6, 0);
                    ctx.fill();
                    // 瓶盖
                    ctx.fillStyle = '#0288d1';
                    ctx.fillRect(-2, -7, 4, 3);
                    // 高光
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.beginPath();
                    ctx.ellipse(-1, -1, 1.5, 3, -0.3, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case 'fan':
                    // 风扇 - 旋转叶片
                    let fanAngle = Date.now() * 0.02;
                    ctx.fillStyle = '#81c784';
                    for (let i = 0; i < 3; i++) {
                        ctx.save();
                        ctx.rotate(fanAngle + i * Math.PI * 2 / 3);
                        ctx.beginPath();
                        ctx.ellipse(0, -4, 2, 5, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }
                    // 中心
                    ctx.fillStyle = '#4caf50';
                    ctx.beginPath();
                    ctx.arc(0, 0, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    // 风圈
                    ctx.strokeStyle = 'rgba(129,199,132,0.4)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(0, 0, 8, 0, Math.PI * 2);
                    ctx.stroke();
                    break;
                case 'rocket':
                    // 火箭 - 有尾焰
                    ctx.fillStyle = '#ef5350';
                    ctx.beginPath();
                    ctx.moveTo(8, 0);
                    ctx.lineTo(-4, -4);
                    ctx.lineTo(-2, 0);
                    ctx.lineTo(-4, 4);
                    ctx.closePath();
                    ctx.fill();
                    // 窗口
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(2, 0, 2, 0, Math.PI * 2);
                    ctx.fill();
                    // 尾焰
                    ctx.fillStyle = '#ff9800';
                    ctx.beginPath();
                    ctx.moveTo(-4, -3);
                    ctx.lineTo(-10 - Math.random() * 4, 0);
                    ctx.lineTo(-4, 3);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = '#ffeb3b';
                    ctx.beginPath();
                    ctx.moveTo(-4, -1.5);
                    ctx.lineTo(-7 - Math.random() * 3, 0);
                    ctx.lineTo(-4, 1.5);
                    ctx.closePath();
                    ctx.fill();
                    break;
                case 'star':
                    // 五角星 - 发光旋转
                    let starAngle = Date.now() * 0.005;
                    ctx.rotate(starAngle);
                    ctx.fillStyle = '#ffd740';
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        let a1 = i * Math.PI * 2 / 5 - Math.PI / 2;
                        let a2 = a1 + Math.PI / 5;
                        ctx.lineTo(Math.cos(a1) * 6, Math.sin(a1) * 6);
                        ctx.lineTo(Math.cos(a2) * 3, Math.sin(a2) * 3);
                    }
                    ctx.closePath();
                    ctx.fill();
                    // 中心亮点
                    ctx.fillStyle = '#fff8e1';
                    ctx.beginPath();
                    ctx.arc(0, 0, 2, 0, Math.PI * 2);
                    ctx.fill();
                    // 光晕
                    ctx.shadowColor = '#ffd740';
                    ctx.shadowBlur = 6;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    break;
                case 'watergun':
                    // 水柱 - 水滴飞溅
                    ctx.fillStyle = 'rgba(41,182,246,0.8)';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 5, 3, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 水花溅射
                    ctx.fillStyle = 'rgba(100,200,255,0.6)';
                    ctx.beginPath();
                    ctx.arc(-2, -3, 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(1, 3, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                    // 高光
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.beginPath();
                    ctx.ellipse(-1, -1, 1, 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case 'scare':
                    // 惊吓波 - 波纹扩散
                    let scarePhase = Date.now() * 0.01;
                    ctx.strokeStyle = 'rgba(161,136,127,0.7)';
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 3; i++) {
                        let r = 3 + i * 3 + Math.sin(scarePhase + i) * 2;
                        ctx.globalAlpha = 0.8 - i * 0.25;
                        ctx.beginPath();
                        ctx.arc(0, 0, r, -0.5, 0.5);
                        ctx.stroke();
                    }
                    ctx.globalAlpha = 1;
                    // 中心感叹号
                    ctx.fillStyle = '#ff5722';
                    ctx.font = 'bold 10px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('!', 0, 0);
                    break;
                case 'stone':
                    // 石子 - 椭圆石头
                    ctx.fillStyle = '#8d6e63';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 5, 4, 0.3, 0, Math.PI * 2);
                    ctx.fill();
                    // 石头纹理
                    ctx.strokeStyle = '#6d4c41';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(-2, -2);
                    ctx.lineTo(1, 1);
                    ctx.stroke();
                    // 高光
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.beginPath();
                    ctx.ellipse(-1, -1, 2, 1, -0.3, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case 'net':
                    // 捕虫网 - 网兜形状
                    ctx.strokeStyle = '#66bb6a';
                    ctx.lineWidth = 1.5;
                    // 网兜圆圈
                    ctx.beginPath();
                    ctx.arc(3, 0, 6, 0, Math.PI * 2);
                    ctx.stroke();
                    // 网格线
                    ctx.globalAlpha = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(-3, -3); ctx.lineTo(9, 3);
                    ctx.moveTo(3, -6); ctx.lineTo(3, 6);
                    ctx.moveTo(-1, 4); ctx.lineTo(7, -4);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                    // 网柄
                    ctx.strokeStyle = '#795548';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(-3, 0);
                    ctx.lineTo(-9, 0);
                    ctx.stroke();
                    break;
                case 'bomb':
                    // 西瓜炸弹 - 小西瓜形状
                    // 绿皮
                    let bombGrad = ctx.createRadialGradient(-1, -1, 0, 0, 0, 6);
                    bombGrad.addColorStop(0, '#4caf50');
                    bombGrad.addColorStop(1, '#1b5e20');
                    ctx.fillStyle = bombGrad;
                    ctx.beginPath();
                    ctx.arc(0, 0, 6, 0, Math.PI * 2);
                    ctx.fill();
                    // 条纹
                    ctx.strokeStyle = '#1b5e20';
                    ctx.lineWidth = 1;
                    ctx.globalAlpha = 0.5;
                    ctx.beginPath();
                    ctx.arc(-2, 0, 6, -0.6, 0.6);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(2, 0, 6, Math.PI - 0.6, Math.PI + 0.6);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                    // 引信
                    ctx.strokeStyle = '#5d4037';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(0, -6);
                    ctx.quadraticCurveTo(3, -10, 2, -12);
                    ctx.stroke();
                    // 火花
                    let sparkSize = 2 + Math.random() * 2;
                    ctx.fillStyle = '#ffeb3b';
                    ctx.beginPath();
                    ctx.arc(2, -12, sparkSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ff5722';
                    ctx.beginPath();
                    ctx.arc(2, -12, sparkSize * 0.6, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                default:
                    // 默认圆形子弹
                    ctx.fillStyle = b.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(0, 0, 2, 0, Math.PI * 2);
                    ctx.fill();
            }
            ctx.restore();
        }

        // Draw effects
        for (let e of game.effects) {
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.maxRadius * (1 - e.life), 0, Math.PI * 2);
            ctx.strokeStyle = e.color + Math.floor(e.life * 128).toString(16).padStart(2, '0');
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // Draw particles
        for (let p of game.particles) {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Draw floating texts
        for (let ft of game.floatingTexts) {
            ctx.globalAlpha = ft.life;
            ctx.fillStyle = ft.color;
            ctx.font = 'bold 14px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.fillText(ft.text, ft.x, ft.y);
        }
        ctx.globalAlpha = 1;
    }

    // ============ 鼠标 & 触摸交互 ============
    let mouseX = 0, mouseY = 0;

    canvas.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    canvas.addEventListener('click', (e) => {
        if (!game.running) return;
        let rect = canvas.getBoundingClientRect();
        let mx = (e.clientX - rect.left) * (800 / rect.width);
        let my = (e.clientY - rect.top) * (600 / rect.height);
        handleCanvasTap(mx, my, e);
    });

    // 触摸事件
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        let touch = e.touches[0];
        mouseX = touch.clientX;
        mouseY = touch.clientY;
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        let touch = e.touches[0];
        mouseX = touch.clientX;
        mouseY = touch.clientY;
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (!game.running) return;
        let rect = canvas.getBoundingClientRect();
        let mx = (mouseX - rect.left) * (800 / rect.width);
        let my = (mouseY - rect.top) * (600 / rect.height);
        handleCanvasTap(mx, my, e);
    }, { passive: false });

    function handleCanvasTap(mx, my, e) {
        let gx = Math.floor(mx / TILE);
        let gy = Math.floor(my / TILE);

        if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return;

        // 暂停时：只允许放塔/选塔/清障碍，不允许触发机关
        if (game.paused) {
            // Check if clicked on a tower
            let clickedTower = null;
            for (let t of game.towers) {
                if (t.gx === gx && t.gy === gy) { clickedTower = t; break; }
            }
            if (clickedTower) {
                game.selectedTower = game.selectedTower === clickedTower ? null : clickedTower;
                game.selectedType = null;
                document.querySelectorAll('.tower-btn').forEach(btn => btn.classList.remove('selected'));
            } else if (game.grid[gx][gy] === 3) {
                attackObstacle(gx, gy);
            } else if (game.selectedType && game.grid[gx][gy] === 0) {
                placeTower(gx, gy);
            } else {
                game.selectedTower = null;
            }
            updateUI();
            return;
        }

        // 检查是否点击了激活的地图机关
        let curLevel = LEVELS[game.currentLevel];
        if (curLevel && curLevel.mapTrigger && game.secretPortalActive) {
            let mt = curLevel.mapTrigger;
            if (Math.abs(gx - mt.x) <= 1 && Math.abs(gy - mt.y) <= 1) {
                triggerSecretPortal();
                return;
            }
        }

        // Check if clicked on a tower
        let clickedTower = null;
        for (let t of game.towers) {
            if (t.gx === gx && t.gy === gy) {
                clickedTower = t;
                break;
            }
        }

        if (clickedTower) {
            game.selectedTower = game.selectedTower === clickedTower ? null : clickedTower;
            game.selectedType = null;
            document.querySelectorAll('.tower-btn').forEach(btn => btn.classList.remove('selected'));
        } else if (game.grid[gx][gy] === 3) {
            // 点击障碍物 - 攻击它
            attackObstacle(gx, gy);
        } else if (game.selectedType && game.grid[gx][gy] === 0) {
            placeTower(gx, gy);
        } else {
            game.selectedTower = null;
        }
        updateUI();
    }

    // 触发地图机关
    function triggerSecretPortal() {
        let level = LEVELS[game.currentLevel];
        game.secretPortalActive = false;
        addParticles(level.mapTrigger.x * TILE + TILE/2, level.mapTrigger.y * TILE + TILE/2, '#e040fb', 20);
        addFloatingText('✨ 机关触发！', level.mapTrigger.x * TILE + TILE/2, level.mapTrigger.y * TILE, '#e040fb');

        // 机关触发获得额外奖励
        game.gold += 100;
        let eggType = Math.floor(Math.random() * EGG_TYPES.length);
        game.eggs.push({ typeIdx: eggType, state: 'egg', progress: 0, feedProgress: 0 });
        game.feedItems.milk = (game.feedItems.milk || 0) + 3;
        saveSaveData();
        checkHiddenUnlocks();

        setTimeout(() => {
            document.getElementById('newUnlockText').innerHTML = `
                <div style="color:#ffd700;font-size:15px;margin-bottom:6px;">🌀 隐藏机关触发！</div>
                <div style="color:#ccc;">获得额外奖励：+100💰、🥚×1、🥛×3</div>
                <div style="color:#888;font-size:11px;margin-top:6px;">机关触发还可能帮你达成解锁条件！</div>`;
            document.getElementById('newUnlockPopup').style.display = 'flex';
            document.getElementById('newUnlockPopup').classList.remove('hidden');
        }, 500);
        updateUI();
    }

    // 攻击障碍物
    function attackObstacle(gx, gy) {
        let ob = game.obstacles.find(o => o.x === gx && o.y === gy && o.hp > 0);
        if (!ob) return;
        let obType = OBSTACLE_TYPES[ob.type];
        let cost = obType.cost;
        if (game.gold < cost) {
            addFloatingText('金币不足!', gx * TILE + TILE / 2, gy * TILE, '#ff5252');
            return;
        }
        game.gold -= cost;
        ob.hp = 0;
        game.grid[gx][gy] = 0;
        game.clearedObstacles++;
        addParticles(gx * TILE + TILE / 2, gy * TILE + TILE / 2, obType.color, 12);
        addFloatingText(`+50💰 清除${obType.name}`, gx * TILE + TILE / 2, gy * TILE - 10, '#4caf50');
        game.gold += 50; // 清除奖励
        updateUI();
    }

    // ============ 游戏循环 ============
    function gameLoop() {
        if (game.running && !game.paused) {
            update();
        } else if (game.running && game.paused) {
            // 暂停时仍推进动画帧（西瓜浮动、暂停遮罩脉冲）
            game.carrotAnim += 0.02;
        }
        if (game.currentLevel !== undefined && LEVELS[game.currentLevel]) {
            draw();
        // 暂停遮罩 - 美化版
        if (game.paused && game.running) {
            // 半透明渐变遮罩
            let pauseGrad = ctx.createLinearGradient(0, 0, 0, 600);
            pauseGrad.addColorStop(0, 'rgba(0,0,0,0.6)');
            pauseGrad.addColorStop(0.5, 'rgba(10,20,50,0.55)');
            pauseGrad.addColorStop(1, 'rgba(0,0,0,0.6)');
            ctx.fillStyle = pauseGrad;
            ctx.fillRect(0, 0, 800, 600);

            // 中央圆角卡片背景
            ctx.fillStyle = 'rgba(10,15,40,0.88)';
            ctx.strokeStyle = 'rgba(255,215,0,0.5)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(250, 220, 300, 160, 18);
            ctx.fill();
            ctx.stroke();

            // 金色光晕
            let pauseGlow = ctx.createRadialGradient(400, 290, 0, 400, 290, 120);
            pauseGlow.addColorStop(0, 'rgba(255,215,0,0.12)');
            pauseGlow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = pauseGlow;
            ctx.fillRect(250, 200, 300, 200);

            // 暂停图标大字
            ctx.font = 'bold 36px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffd700';
            ctx.shadowColor = 'rgba(255,215,0,0.6)';
            ctx.shadowBlur = 15;
            ctx.fillText('⏸ 游戏暂停', 400, 263);
            ctx.shadowBlur = 0;

            // 分割线
            ctx.strokeStyle = 'rgba(255,215,0,0.25)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(280, 286); ctx.lineTo(520, 286);
            ctx.stroke();

            // 提示文字
            ctx.font = '15px Microsoft YaHei';
            ctx.fillStyle = '#a0e8a0';
            ctx.fillText('✅ 现在可以布置炮塔！', 400, 308);

            ctx.font = '13px Microsoft YaHei';
            ctx.fillStyle = '#aaa';
            ctx.fillText('点击「继续」恢复战斗', 400, 333);

            // 底部金币提示
            ctx.font = 'bold 14px Microsoft YaHei';
            ctx.fillStyle = '#ffd700';
            ctx.fillText(`💰 当前金币：${game.gold}`, 400, 357);
        }
        }
        requestAnimationFrame(gameLoop);
    }

    // ============ 启动 ============
    loadSaveData();
    showStart();
    resizeCanvas();
    gameLoop();
    </script>
</body>
</html>
